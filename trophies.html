<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Armoire à Trophées - FEL-X</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- COULEURS DES TIERS DE TROPHÉES --- */
        .tier-standard { color: #94a3b8; border-color: #475569; background: rgba(148,163,184,0.1); }
        .tier-bronze { color: #d97706; border-color: #b45309; background: rgba(217,119,6,0.1); }
        .tier-argent { color: #cbd5e1; border-color: #94a3b8; background: rgba(203,213,225,0.1); }
        .tier-or { color: #fbbf24; border-color: #d97706; background: rgba(251,191,36,0.1); box-shadow: 0 0 10px rgba(251,191,36,0.2); }
        .tier-platine { color: #2dd4bf; border-color: #0d9488; background: rgba(45,212,191,0.1); box-shadow: 0 0 15px rgba(45,212,191,0.3); }
        .tier-diamant { color: #c084fc; border-color: #9333ea; background: rgba(192,132,252,0.1); box-shadow: 0 0 20px rgba(192,132,252,0.4); }

        .trophy-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .trophy-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 245, 195, 0.05);
            z-index: 10;
        }

        .trophy-icon-wrapper {
            font-size: 3.5rem;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .trophy-card:hover .trophy-icon-wrapper {
            transform: scale(1.2) rotate(10deg);
        }

        .trophy-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .trophy-title {
            color: #fff;
            font-weight: 900;
            font-size: 1.15rem;
            margin-bottom: 6px;
            line-height: 1.2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .trophy-desc {
            color: var(--text-dim);
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .trophy-date {
            font-size: 0.7rem;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: auto;
        }

        .tier-badge {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid;
            display: inline-block;
            width: fit-content;
        }

        /* Section Compteurs (Le Podium en haut) */
        .counters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .counter-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s ease;
        }

        .counter-box:hover {
            transform: translateY(-5px);
        }

        .counter-val {
            font-size: 2.2rem;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }

        #loader {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- La sidebar est injectée ici par sidebar.js -->

    <main id="main-content">
        <div id="loader">
            <div style="width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 20px; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; font-size: 0.8rem; text-transform: uppercase;">Ouverture de l'armoire...</p>
        </div>

        <div id="trophies-container" style="display: none;">
            <header>
                <h1>Armoire à Trophées</h1>
                <p class="page-desc">Contemplez vos hauts faits et les distinctions que vous avez débloqués sur la chaîne.</p>
            </header>

            <div class="card" style="border-color: rgba(0, 245, 195, 0.2); background: rgba(0, 245, 195, 0.02);">
                <h2 style="font-size: 0.85rem; font-weight: 800; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; margin-bottom: 2rem; display: flex; align-items: center; gap: 10px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                    Collection (<span id="total-trophies">0</span>)
                </h2>
                
                <!-- LES COMPTEURS EN HAUT -->
                <div id="counters-grid" class="counters-grid">
                    <!-- Injecté par JS -->
                </div>

                <!-- LA LISTE DES TROPHÉES -->
                <div class="grid" id="trophies-grid" style="grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem;">
                    <!-- Injecté par JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="sidebar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const token = checkAuth();
            if (!token) return;

            const API_URL = CONFIG.API_BASE_URL;
            const CLIENT_ID = CONFIG.CLIENT_ID;

            try {
                // 1. Récupérer l'ID Twitch du viewer
                const userResp = await fetch('https://api.twitch.tv/helix/users', {
                    headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CLIENT_ID }
                });
                const userData = await userResp.json();
                if(!userData.data || userData.data.length === 0) throw new Error("Utilisateur introuvable");
                const user = userData.data[0];

                // 2. Récupérer le profil depuis l'API (qui contient les trophées)
                const botResp = await fetch(`${API_URL}/viewer/${user.id}?t=${new Date().getTime()}`, {
                    headers: { "ngrok-skip-browser-warning": "true" }
                });

                if (botResp.ok) {
                    const data = await botResp.json();
                    
                    const trophies = data.trophies || [];
                    const tCounts = data.tier_counts || {};
                    
                    document.getElementById('total-trophies').textContent = trophies.length;

                    // --- RENDU DES COMPTEURS (PODIUM) ---
                    let countersHtml = '';
                    const tiers = [
                        { key: 'Diamant', icon: '💎', cls: 'tier-diamant' },
                        { key: 'Platine', icon: '💠', cls: 'tier-platine' },
                        { key: 'Or', icon: '🥇', cls: 'tier-or' },
                        { key: 'Argent', icon: '🥈', cls: 'tier-argent' },
                        { key: 'Bronze', icon: '🥉', cls: 'tier-bronze' },
                        { key: 'Standard', icon: '🏆', cls: 'tier-standard' }
                    ];

                    tiers.forEach(t => {
                        // On affiche le compteur même s'il est à 0 pour montrer ce qu'il reste à débloquer
                        countersHtml += `
                            <div class="counter-box ${t.cls}" style="opacity: ${tCounts[t.key] > 0 ? '1' : '0.3'}; filter: ${tCounts[t.key] > 0 ? 'none' : 'grayscale(1)'};">
                                <div style="font-size: 1.8rem; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));">${t.icon}</div>
                                <div class="counter-val">${tCounts[t.key] || 0}</div>
                                <div style="font-size: 0.7rem; font-weight: 900; text-transform: uppercase;">${t.key}</div>
                            </div>
                        `;
                    });
                    document.getElementById('counters-grid').innerHTML = countersHtml;

                    // --- RENDU DES CARTES TROPHÉES ---
                    if (trophies.length === 0) {
                        document.getElementById('trophies-grid').innerHTML = `
                            <div style="grid-column: 1 / -1; text-align: center; padding: 4rem; opacity: 0.5;">
                                <div style="font-size: 4rem; margin-bottom: 1rem;">🕸️</div>
                                <p style="font-size: 1.1rem; font-weight: 700; color: #fff;">Votre armoire est vide...</p>
                                <p style="font-size: 0.9rem;">Participez au chat et soutenez le stream pour débloquer vos premières distinctions !</p>
                            </div>
                        `;
                    } else {
                        document.getElementById('trophies-grid').innerHTML = trophies.map(t => {
                            const tierLower = (t.tier || 'Standard').toLowerCase();
                            // Format de date
                            const dateStr = new Date(t.earned_at).toLocaleDateString('fr-FR', {
                                day: 'numeric', month: 'long', year: 'numeric'
                            });

                            return `
                            <div class="trophy-card">
                                <div class="trophy-icon-wrapper">${t.icon || '🏆'}</div>
                                <div class="trophy-details">
                                    <div class="trophy-title">${t.label}</div>
                                    <div class="trophy-desc">${t.description || 'Haut fait accompli avec brio.'}</div>
                                    
                                    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto;">
                                        <span class="tier-badge tier-${tierLower}">${t.tier || 'Standard'}</span>
                                        <span class="trophy-date">Obtenu le ${dateStr}</span>
                                    </div>
                                </div>
                            </div>`;
                        }).join('');
                    }

                    document.getElementById("loader").style.display = "none";
                    document.getElementById("trophies-container").style.display = "block";
                }
            } catch (e) {
                document.getElementById("loader").innerHTML = `<p style="color:var(--danger); font-weight:bold;">Impossible de charger votre armoire.</p>`;
            }
        });
    </script>
</body>
</html>
