<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
				<title>Clips - FEL-X</title>
				<!-- On utilise le style.css Master pour les marges et le design sombre -->
				<link rel="stylesheet" href="style.css">
					<style>
						.search-container { position: relative; margin-bottom: 2rem; max-width: 600px; }
						.search-input {
						width: 100%; padding: 16px 20px 16px 52px; background: var(--surface);
						border: 1px solid var(--border); border-radius: 20px; color: #fff;
						outline: none; transition: 0.3s;
						}
						.search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
						.search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }

						.clips-grid {
						display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
						gap: 2rem; margin-top: 1rem;
						}

						.clip-card {
						background: var(--surface); border: 1px solid var(--border);
						border-radius: 24px; overflow: hidden; text-decoration: none;
						display: flex; flex-direction: column; transition: all 0.3s ease;
						}
						.clip-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

						.clip-thumb-box { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; overflow: hidden; }
						.clip-thumb-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
						.clip-card:hover .clip-thumb-box img { transform: scale(1.05); }

						.clip-duration {
						position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.8);
						color: #fff; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 800;
						}
						.clip-info { padding: 1.5rem; flex-grow: 1; }
						.clip-title { color: #fff; font-weight: 700; margin-bottom: 10px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
						.clip-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-dim); }
						.clip-author { color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.7rem; }

						#loading-counter { color: var(--accent); font-weight: 800; font-family: monospace; }
						@keyframes spin { to { transform: rotate(360deg); } }
					</style>
				</head>
	<body>
		<!-- La sidebar est injectée ici par sidebar.js -->

		<main>
			<header>
				<h1>Galerie de Clips</h1>
				<p class="page-desc">L'intégralité des moments cultes, du plus récent au plus ancien.</p>
			</header>

			<div class="search-container">
				<svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
					<circle cx="11" cy="11" r="8"></circle>
					<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
				</svg>
				<input type="text" id="clipSearch" class="search-input" placeholder="Rechercher par titre ou clipper...">
        </div>

			<div id="clips-root" class="clips-grid">
				<div id="initial-loader" style="grid-column: 1 / -1; text-align: center; padding: 5rem;">
					<div style="width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto;"></div>
					<p style="color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
						Récupération de tous les clips... [<span id="loading-counter">0</span>]
					</p>
				</div>
			</div>
		</main>

		<script src="config.js"></script>
		<script src="app.js"></script>
		<script src="sidebar.js"></script>
		<script src="clips.js"></script>
	</body>
</html>
