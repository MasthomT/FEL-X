<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
				<title>FEL-X - Portail de Connexion</title>
				<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
					<style>
						:root { --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --text-dim: #94a3b8; --accent-purple: #8b5cf6; --accent-green: #10b981; }
						* { margin: 0; padding: 0; box-sizing: border-box; }
						body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

						/* Petits effets de lumière en fond */
						body::before, body::after {
						content: ''; position: absolute; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.4;
						}
						body::before { top: -10%; left: -10%; width: 40vw; height: 40vw; background: rgba(139, 92, 246, 0.3); }
						body::after { bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: rgba(16, 185, 129, 0.2); }

						.container { text-align: center; padding: 3rem; max-width: 500px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid #334155; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); z-index: 10; position: relative; }
						.logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--surface); margin-bottom: 2rem; box-shadow: 0 0 30px rgba(139, 92, 246, 0.4); object-fit: cover;}

						h1 { font-size: 2.5rem; margin-bottom: 1rem; font-weight: 800; }
						.text-gradient { background: linear-gradient(to right, var(--accent-purple), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
						p { font-size: 1.05rem; color: var(--text-dim); margin-bottom: 2.5rem; line-height: 1.6; }

						.btn-twitch { display: inline-flex; align-items: center; justify-content: center; gap: 12px; background: #9146FF; color: white; padding: 16px 32px; border-radius: 12px; font-weight: 800; font-size: 1.1rem; border: none; cursor: pointer; transition: all 0.3s; width: 100%; box-shadow: 0 10px 20px rgba(145, 70, 255, 0.2); }
						.btn-twitch:hover { background: #a970ff; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(145, 70, 255, 0.4); }
						.btn-twitch:active { transform: translateY(0); }

						@media (max-width: 600px) {
						.container { padding: 2.5rem 1.5rem; margin: 1rem; border-radius: 20px; }
						h1 { font-size: 2rem; }
						}
					</style>
				</head>
	<body>
		<div class="container">
			<!-- Logo du site -->
			<img src="logo-felix.png" alt="FEL-X" class="logo" onerror="this.src='https://static-cdn.jtvnw.net/user-default-pictures-uv/41780b5a-def8-11e9-94d9-784f43822e80-profile_image-70x70.png'">

				<h1>
					Portail <span class="text-gradient">FEL-X</span>
				</h1>
				<p>Connecte-toi de manière sécurisée avec ton compte Twitch pour accéder à tes statistiques et à ton profil IA.</p>

				<!-- Appel de la fonction 100% Twitch (sans Firebase) -->
				<button onclick="loginWithTwitch()" class="btn-twitch">
					<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
						<path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/>
					</svg>
					Connexion avec Twitch
				</button>
			</div>

		<!-- Importation des scripts vitaux -->
		<script src="config.js"></script>
		<script src="app.js"></script>

		<script>
			// Si le viewer a déjà un token actif, ou s'il vient de se connecter et que Twitch
			// le renvoie ici avec le token dans l'URL, checkAuth() va le capturer et l'envoyer sur profile.html
			document.addEventListener("DOMContentLoaded", () => {
			checkAuth();
			});
		</script>
	</body>
</html>
