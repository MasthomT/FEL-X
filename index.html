<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
				<title>Maintenance - FEL-X</title>
				<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
					<style>
						:root {
						--bg: #18181b;
						--surface: #27272a;
						--border: #3f3f46;
						--text: #f4f4f5;
						--text-dim: #a1a1aa;
						--accent: #00f5c3;
						}
						* { margin: 0; padding: 0; box-sizing: border-box; }
						body {
						background: var(--bg);
						color: var(--text);
						font-family: 'Inter', sans-serif;
						display: flex;
						flex-direction: column;
						align-items: center;
						justify-content: center;
						min-height: 100vh;
						overflow: hidden;
						}
						.container {
						text-align: center;
						padding: 2rem;
						max-width: 600px;
						animation: fadeIn 1s ease-out;
						}
						.logo-wrapper {
						position: relative;
						display: inline-block;
						margin-bottom: 2.5rem;
						}
						.logo {
						width: 120px;
						height: 120px;
						border-radius: 50%;
						border: 4px solid var(--surface);
						position: relative;
						z-index: 2;
						background: var(--bg);
						object-fit: cover;
						}
						.pulse {
						position: absolute;
						top: 0;
						left: 0;
						width: 100%;
						height: 100%;
						border-radius: 50%;
						background: var(--accent);
						z-index: 1;
						animation: pulse-anim 2s infinite;
						opacity: 0.5;
						}
						h1 {
						font-size: 3rem;
						color: white;
						margin-bottom: 1rem;
						font-weight: 800;
						letter-spacing: -1px;
						}
						.accent { color: var(--accent); }
						p {
						font-size: 1.1rem;
						color: var(--text-dim);
						line-height: 1.6;
						margin-bottom: 2.5rem;
						}
						.status-badge {
						display: inline-flex;
						align-items: center;
						gap: 10px;
						background: rgba(0, 245, 195, 0.1);
						border: 1px solid rgba(0, 245, 195, 0.2);
						color: var(--accent);
						padding: 10px 20px;
						border-radius: 50px;
						font-weight: 600;
						font-size: 0.9rem;
						text-transform: uppercase;
						letter-spacing: 1px;
						}
						.dot {
						width: 10px;
						height: 10px;
						background: var(--accent);
						border-radius: 50%;
						animation: blink 1.5s infinite;
						box-shadow: 0 0 10px var(--accent);
						}

						@keyframes fadeIn {
						from { opacity: 0; transform: translateY(20px); }
						to { opacity: 1; transform: translateY(0); }
						}
						@keyframes pulse-anim {
						0% { transform: scale(1); opacity: 0.6; }
						100% { transform: scale(1.6); opacity: 0; }
						}
						@keyframes blink {
						0%, 100% { opacity: 1; }
						50% { opacity: 0.3; }
						}
					</style>
				</head>
	<body>
		<div class="container">
			<div class="logo-wrapper">
				<div class="pulse"></div>
				<!-- Assure-toi que logo-felix.png est bien présent à la racine de ton Vercel -->
				<img src="logo-felix.png" alt="FEL-X" class="logo" onerror="this.src='https://static-cdn.jtvnw.net/user-default-pictures-uv/41780b5a-def8-11e9-94d9-784f43822e80-profile_image-70x70.png'">
        </div>

			<h1>
				En <span class="accent">Maintenance</span>
			</h1>

			<p>
				Le cerveau de Félix est actuellement débranché pour recevoir une énorme mise à jour.<br>Revenez un peu plus tard !</p>

			<div class="status-badge">
				<div class="dot"></div>
				Travaux en cours
			</div>
		</div>
	</body>
</html>
