<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEL-X - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --text-dim: #94a3b8; --accent-purple: #8b5cf6; --accent-green: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .container { text-align: center; padding: 3rem; max-width: 500px; background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--surface); margin-bottom: 2rem; box-shadow: 0 0 30px rgba(139, 92, 246, 0.3); }
        
        h1 { font-size: 2.5rem; margin-bottom: 1rem; font-weight: 800; }
        .text-gradient { background: linear-gradient(to right, var(--accent-purple), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1rem; color: var(--text-dim); margin-bottom: 2.5rem; line-height: 1.5; }
        
        .btn-twitch { display: inline-flex; align-items: center; gap: 10px; background: #9146FF; color: white; padding: 15px 30px; border-radius: 12px; font-weight: 800; font-size: 1.1rem; border: none; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-twitch:hover { background: #a970ff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(145, 70, 255, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo-felix.png" alt="FEL-X" class="logo" onerror="this.style.display='none'">
        <h1>Portail <span class="text-gradient">FEL-X</span></h1>
        <p>Connectez-vous de manière sécurisée avec votre compte Twitch pour accéder à vos statistiques et à votre profil IA.</p>
        
        <button onclick="loginWithTwitch()" class="btn-twitch">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>
            Connexion avec Twitch
        </button>
    </div>

    <!-- Chargement des scripts -->
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        // Dès que la page charge, on vérifie si on vient de se connecter
        document.addEventListener("DOMContentLoaded", () => {
            checkAuth();
        });
    </script>
</body>
</html>
