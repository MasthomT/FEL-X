<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
				<title>Commandes - FEL-X</title>
				<link rel="stylesheet" href="style.css">
					<style>
						/* --- STYLE DESKTOP (PC) --- */
						main { padding: 2rem; margin-left: 250px; min-height: 100vh; }
						.controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
						.search-input, .filter-select { padding: 12px; background: var(--surface); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: inherit; }

						table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; }
						th { text-align: left; padding: 15px; background: rgba(255,255,255,0.05); color: var(--text-dim); border-bottom: 2px solid var(--border); }
						td { padding: 15px; border-bottom: 1px solid var(--border); color: white; }
						.command-trigger { color: var(--accent); font-weight: bold; font-family: monospace; }

						/* --- OPTIMISATION MOBILE (< 800px) --- */
        @media (max-width: 800px) {
            main { margin-left: 0 !important; padding: 1.5rem 1rem 100px 1rem !important; }
            .controls { flex-direction: column; }
            h1 { text-align: center; font-size: 1.6rem; }

            table, thead, tbody, th, td, tr { display: block !important; width: 100% !important; }
            thead { display: none; } 

            tr {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 15px;
                margin-bottom: 1.5rem;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            }

            /* On retire les labels (Commande, Description...) */
            td::before { display: none !important; }

            td {
                display: block !important;
                padding: 4px 0 !important;
                border: none !important;
                text-align: left !important;
                background: transparent !important;
            }

            /* On stylise les éléments pour qu'ils soient lisibles sans labels */
            td:nth-child(1) { /* La Commande */
                font-size: 1.2rem;
                margin-bottom: 8px;
            }
            td:nth-child(2) { /* La Description */
                color: var(--text-main);
                margin-bottom: 12px;
                line-height: 1.4;
            }
            td:nth-child(3), td:nth-child(4) { /* Catégorie et Accès */
                display: inline-block !important;
                width: auto !important;
                font-size: 0.75rem;
                background: rgba(255,255,255,0.05) !important;
                padding: 4px 10px !important;
                border-radius: 6px !important;
                margin-right: 8px;
                color: var(--text-dim);
                text-transform: uppercase;
                font-weight: bold;
            }
            /* Accent sur l'accès pour mieux le voir */
            td:nth-child(4) { color: var(--accent); border: 1px solid rgba(0, 245, 195, 0.2) !important; }
        }

        /* Styles Modal Admin */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal { background: var(--surface); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); width: 90%; max-width: 500px; }
        .btn-save { background: var(--accent); color: #18181b; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
					</style>
				</head>
