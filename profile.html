<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Profil - FEL-X</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        main { padding: 2rem; margin-left: 240px; min-height: 100vh; }
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .profile-header {
            display: flex; align-items: center; gap: 25px; margin-bottom: 2rem;
            background: var(--surface); padding: 1.5rem 2rem; border-radius: 12px;
            border: 1px solid var(--border);
        }
        .avatar-large { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }
        .stats-mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .xp-bar-bg { width: 100%; height: 10px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .xp-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s ease; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .card-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-bottom: 1px solid var(--border); 
            background: rgba(255, 255, 255, 0.02); margin-bottom: 5px; border-radius: 8px;
        }
        @media (max-width: 800px) {
            main { margin-left: 0; padding: 1rem; }
            .stats-mini-grid { grid-template-columns: 1fr 1fr; }
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="profile.html" class="logo"><img src="logo-felix.png"><span>FEL-X</span></a>
        <a href="profile.html" class="nav-link active">Profil</a>
        <a href="leaderboard.html" class="nav-link">Classement</a>
        <a href="clips.html" class="nav-link">Clips</a>
        <a href="#" id="logout-btn" class="nav-link logout">Déconnexion</a>
    </nav>

    <main>
        <div id="loading-overlay">
            <h2>Initialisation...</h2>
            <p>Chargement des sessions</p>
        </div>

        <div class="profile-header">
            <img id="avatar" class="avatar-large" src="">
            <div>
                <h1 id="username" style="margin:0;">Chargement...</h1>
                <div id="rank" style="color:gray;">Rang #--</div>
            </div>
        </div>

        <div class="xp-container" style="margin-bottom:2rem;">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span id="level-label">NIVEAU 1</span>
                <span><span id="current-xp">0</span> XP</span>
            </div>
            <div class="xp-bar-bg"><div class="xp-fill" id="xp-fill"></div></div>
        </div>

        <div class="stats-mini-grid">
            <div class="stat-box"><div>Watchtime</div><div id="stat-watchtime" style="font-size:1.2rem; font-weight:bold;">-</div></div>
            <div class="stat-box"><div>XP Total</div><div id="stat-xp" style="font-size:1.2rem; font-weight:bold;">0</div></div>
            <div class="stat-box"><div>Humeur</div><div id="felix-mood" style="font-size:1.2rem; font-weight:bold;">-</div></div>
            <div class="stat-box"><div>Abo</div><div id="stat-sub" style="font-size:1.2rem; font-weight:bold;">-</div></div>
        </div>

        <div class="main-grid">
            <div class="card-panel">
                <h3 style="color:var(--accent);">📜 Historique des Sessions</h3>
                <ul id="xp-history-list" style="list-style:none; padding:0;"></ul>
            </div>
            <div class="card-panel" id="poll-container" style="display:none;">
                <h3 style="color:var(--accent);">📊 Sondage</h3>
                <div id="poll-options"></div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>

    <script>
        const CLIENT_ID_VERCEL = "kgyfzs0k3wk8enx7p3pd6299ro4izv";
        var db = firebase.database();

        function formatDate(ts) {
            const d = new Date(ts);
            return d.toLocaleDateString('fr-FR') + " " + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const token = checkAuth();
            if (!token) return;

            try {
                const headers = { 'Authorization': `Bearer ${token}`, 'Client-Id': CLIENT_ID_VERCEL };
                const userResp = await fetch('https://api.twitch.tv/helix/users', { headers });
                const userData = await userResp.json();
                const userKey = userData.data[0].login.toLowerCase();

                document.getElementById("username").textContent = userData.data[0].display_name;
                document.getElementById("avatar").src = userData.data[0].profile_image_url;
                document.getElementById("loading-overlay").style.display = "none";

                // --- CHARGEMENT XP & NIVEAU ---
                db.ref('viewer_data/xp_data/' + userKey).on('value', snap => {
                    const xp = snap.val()?.xp || snap.val() || 0;
                    const level = calculateLevel(xp);
                    document.getElementById("stat-xp").textContent = xp.toLocaleString();
                    document.getElementById("current-xp").textContent = xp.toLocaleString();
                    document.getElementById("level-label").textContent = "NIVEAU " + level;
                    
                    const nextXp = Math.floor(100 * Math.pow(level, 2.2));
                    const currXp = Math.floor(100 * Math.pow(level - 1, 2.2));
                    const prog = ((xp - currXp) / (nextXp - currXp)) * 100;
                    document.getElementById("xp-fill").style.width = Math.min(100, prog) + "%";
                });

                // --- CHARGEMENT WATCHTIME ---
                db.ref('viewer_data/stats_perma/' + userKey).on('value', snap => {
                    const min = snap.val()?.total_presence_minutes || 0;
                    document.getElementById("stat-watchtime").textContent = Math.floor(min/60) + "h " + (min%60) + "m";
                });

                // --- CHARGEMENT HISTORIQUE SESSIONS (C'est ici la correction !) ---
                db.ref('viewer_data/history_sessions/' + userKey).on('value', snap => {
                    const data = snap.val();
                    const list = document.getElementById("xp-history-list");
                    list.innerHTML = "";

                    if (!data) {
                        list.innerHTML = "<li>Aucune session trouvée.</li>";
                        return;
                    }

                    // On trie par date (plus récent en haut)
                    Object.values(data).sort((a,b) => b.timestamp - a.timestamp).forEach(item => {
                        let icon = item.reason.includes('presence') ? "🎬" : "💬";
                        let label = item.reason.includes('presence') ? "Stream" : "Chat";
                        let detail = item.duration ? `(${item.duration} min)` : `(${item.count} msg)`;
                        
                        list.innerHTML += `
                        <li class="history-item">
                            <div>
                                <strong>${icon} ${label}</strong> ${detail}<br>
                                <small style="color:gray;">${formatDate(item.timestamp)}</small>
                            </div>
                            <div style="font-weight:bold; color:var(--accent);">+${item.amount} XP</div>
                        </li>`;
                    });
                });

                // --- LOGS FÉLIX ---
                db.ref('viewer_logs/' + userKey).on('value', snap => {
                    document.getElementById("felix-mood").textContent = snap.val()?.mood || "Normal";
                });

            } catch (e) { console.error(e); }
        });
    </script>
</body>
</html>
