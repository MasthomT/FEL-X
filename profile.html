<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>Mon Profil - FEL-X</title>
				<!-- Les styles globaux sont injectés par sidebar.js -->
				<style>
					@keyframes spin { to { transform: rotate(360deg); } }
					.spinner { animation: spin 1s linear infinite; }

					/* Styles spécifiques à la page profil pour peaufiner l'épuration */
					.xp-bar-container {
					width: 100%; height: 8px; background: rgba(255,255,255,0.05);
					border-radius: 10px; overflow: hidden; margin-top: 15px;
					}
					.xp-bar-fill {
					height: 100%; width: 0%;
					background: linear-gradient(90deg, var(--accent), #10b981);
					transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
					}
					.history-row td { transition: background 0.2s; }
					.history-row:hover td { background: rgba(255,255,255,0.04); }
				</style>
			</head>
	<body>
		<main>
			<!-- Écran de chargement minimaliste -->
			<div id="loading-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh;">
				<div class="spinner" style="width: 32px; height: 32px; border: 3px solid rgba(139, 92, 246, 0.1); border-top-color: #8b5cf6; border-radius: 50%;"></div>
				<p style="margin-top: 20px; color: #94a3b8; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.5px;">Synchronisation des données...</p>
			</div>

			<!-- Contenu Principal (caché au début) -->
			<div id="content" style="display: none;">
				<header style="margin-bottom: 3rem;">
					<h1 id="user-display">Chargement...</h1>
					<p class="page-desc">Consultez votre progression et votre identité mémorisée.</p>
				</header>

				<!-- Carte de Niveau / Avatar -->
				<div class="card" style="display: flex; align-items: center; gap: 2.5rem; border-left: 4px solid var(--accent);">
					<div style="position: relative;">
						<img id="user-avatar" src="" style="width: 110px; height: 110px; border-radius: 50%; border: 4px solid rgba(139, 92, 246, 0.2); object-fit: cover; background: #0f172a;">
							<div id="rank-badge" style="position: absolute; bottom: -5px; right: -5px; background: #8b5cf6; color: white; padding: 4px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 900; border: 3px solid #1e293b;">#--</div>
						</div>

					<div style="flex-grow: 1;">
						<div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px;">
							<div>
								<span style="display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 4px;">Niveau Actuel</span>
								<span style="font-size: 2.5rem; font-weight: 900; color: #fff; line-height: 1;">
									Lvl <span id="lvl-text">1</span>
								</span>
							</div>
							<div style="text-align: right;">
								<span style="color: #94a3b8; font-weight: 700; font-size: 0.95rem;">
									<span id="xp-current" style="color: #fff;">0</span>
									<span style="opacity: 0.5; font-weight: 400;">/</span>
									<span id="xp-next">100</span>
									<span style="font-size: 0.7rem; opacity: 0.8;">XP</span>
								</span>
							</div>
						</div>
						<div class="xp-bar-container">
							<div id="xp-bar" class="xp-bar-fill"></div>
						</div>
					</div>
				</div>

				<!-- Grille de Stats -->
				<div class="stats-grid">
					<div class="stat-box">
						<div class="stat-label">Messages</div>
						<div class="stat-value" id="stat-messages">0</div>
					</div>
					<div class="stat-box">
						<div class="stat-label">Watchtime</div>
						<div class="stat-value" id="stat-watchtime">0h 0m</div>
					</div>
					<div class="stat-box">
						<div class="stat-label">Points</div>
						<div class="stat-value" id="stat-points">0</div>
					</div>
					<div class="stat-box">
						<div class="stat-label">Statut</div>
						<div class="stat-value" id="stat-status" style="font-size: 1.2rem; color: #10b981; text-transform: uppercase;">Actif</div>
					</div>
				</div>

				<!-- Contexte IA -->
				<div class="card">
					<h2 style="font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: #10b981; letter-spacing: 2px; margin-bottom: 2rem; display: flex; align-items: center; gap: 10px;">
						<svg style="width:18px; height:18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<path d="M12 2a10 10 0 1 0 10 10H12V2z"/>
							<path d="M12 12L2.1 12.1"/>
							<path d="M12 12l9.9-0.1"/>
							<path d="M12 12V22"/>
							<path d="M12 12L4.93 4.93"/>
							<path d="M12 12l7.07 7.07"/>
							<path d="M12 12L4.93 19.07"/>
							<path d="M12 12l7.07-7.07"/>
						</svg>
						Fiche mémorisée par Félix
					</h2>
					<div id="ai-context" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2.5rem;">
						<!-- Injecté par JS -->
					</div>
				</div>

				<!-- Historique -->
				<div class="card" style="padding: 0; overflow: hidden;">
					<h2 style="padding: 1.5rem 2rem; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; border-bottom: 1px solid var(--border); letter-spacing: 1px;">Dernières activités</h2>
					<table style="margin-top: 0; width: 100%;">
						<thead>
							<tr>
								<th style="padding-left: 2rem;">Date</th>
								<th>Événement</th>
								<th style="text-align: right; padding-right: 2rem;">Gain</th>
							</tr>
						</thead>
						<tbody id="history-list">
							<!-- Injecté par JS -->
						</tbody>
					</table>
				</div>
			</div>
		</main>

		<script src="config.js"></script>
		<script src="app.js"></script>
		<script src="sidebar.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", async () => {
			const token = checkAuth();
			if (!token) return;

			try {
			// 1. Infos Twitch
			const userResp = await fetch('https://api.twitch.tv/helix/users', {
			headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CONFIG.CLIENT_ID }
			});
			const userData = await userResp.json();
			const user = userData.data[0];

			document.getElementById("user-display").textContent = user.display_name;
			document.getElementById("user-avatar").src = user.profile_image_url;

			// 2. Infos Bot
			const botResp = await fetch(`${CONFIG.API_BASE_URL}/viewer/${user.id}`, {
			headers: { "ngrok-skip-browser-warning": "true" }
			});

			if (botResp.ok) {
			const data = await botResp.json();

			// Niveaux
			const xp = data.points || 0;
			const level = calculateLevel(xp);
			const nextXp = Math.floor(100 * Math.pow(level, 2.2));
			const prevXp = Math.floor(100 * Math.pow(level - 1, 2.2));
			const progress = ((xp - prevXp) / (nextXp - prevXp)) * 100;

			document.getElementById("lvl-text").textContent = level;
			document.getElementById("xp-current").textContent = xp.toLocaleString('fr-FR');
			document.getElementById("xp-next").textContent = nextXp.toLocaleString('fr-FR');
			setTimeout(() => {
			document.getElementById("xp-bar").style.width = Math.min(100, Math.max(0, progress)) + "%";
			}, 100);

			// Stats
			document.getElementById("stat-messages").textContent = (data.messages || 0).toLocaleString('fr-FR');
			const hours = Math.floor((data.watchtime || 0) / 3600);
			const minutes = Math.floor(((data.watchtime || 0) % 3600) / 60);
			document.getElementById("stat-watchtime").textContent = `${hours}h ${minutes}m`;
			document.getElementById("stat-points").textContent = xp.toLocaleString('fr-FR');
			document.getElementById("rank-badge").textContent = `#${data.rank || '--'}`;

			// Contexte IA
			document.getElementById("ai-context").innerHTML = `
			<div>
				<small style="color:#94a3b8; font-weight:800; text-transform:uppercase; font-size:0.65rem; letter-spacing:1px; display:block; margin-bottom:5px;">Surnom IA</small>
				<p style="font-weight:700; font-size:1.1rem; color:#fff;">${data.nickname_for_bot || 'Non défini'}</p>
			</div>
			<div>
				<small style="color:#94a3b8; font-weight:800; text-transform:uppercase; font-size:0.65rem; letter-spacing:1px; display:block; margin-bottom:5px;">Ta Vibe</small>
				<p style="font-weight:700; font-size:1.1rem; color:#fff;">${data.vibe || 'Analyse...'}</p>
			</div>
			<div>
				<small style="color:#94a3b8; font-weight:800; text-transform:uppercase; font-size:0.65rem; letter-spacing:1px; display:block; margin-bottom:5px;">Jeu de coeur</small>
				<p style="font-weight:700; font-size:1.1rem; color:#fff;">${data.favorite_game || 'Aucun'}</p>
			</div>
			<div style="grid-column: 1/-1; background: rgba(16, 185, 129, 0.05); padding: 1.5rem; border-radius: 16px; border: 1px solid rgba(16, 185, 129, 0.1);">
				<small style="color:#10b981; font-weight:800; text-transform:uppercase; font-size:0.65rem; letter-spacing:1px; display:block; margin-bottom:8px;">Note de Félix à ton sujet</small>
				<p style="font-style:italic; color:#d1d5db; line-height:1.6;">"${data.free_message || 'Je t\'observe en silence...'}"</p>
			</div>
			`;

			// Historique
			const list = document.getElementById("history-list");
			if (!data.history || data.history.length === 0) {
			list.innerHTML = `<tr>
				<td colspan="3" style="text-align:center; padding:3rem; color:var(--text-dim); italic;">Aucune activité enregistrée. Parle dans le chat !</td>
			</tr>`;
			} else {
			data.history.forEach(h => {
			const tr = document.createElement("tr");
			tr.className = "history-row";
			const date = new Date(h.timestamp.replace(" ", "T")).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
			tr.innerHTML = `
			<td data-label="Date" style="color:#64748b; padding-left: 2rem; font-weight:600;">${date}</td>
			<td data-label="Action" style="font-weight:700; color:#e2e8f0;">${h.event_type.toUpperCase()}</td>
			<td data-label="Gain" style="text-align:right; color:var(--accent); font-weight:900; padding-right: 2rem; font-family: 'JetBrains Mono', monospace;">+${h.amount}</td>
			`;
			list.appendChild(tr);
			});
			}
			}

			document.getElementById("loading-screen").style.display = "none";
			document.getElementById("content").style.display = "block";

			} catch (e) {
			console.error(e);
			document.getElementById("loading-screen").innerHTML = `<p style="color:#f43f5e; font-weight:700;">Impossible de charger les données. Vérifie ton bot !</p>`;
			}
			});
		</script>
	</body>
</html>
