<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Profil - FEL-X</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- STYLE DE BASE --- */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        main { padding: 2rem; margin-left: 240px; min-height: 100vh; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .profile-header {
            display: flex; align-items: center; gap: 25px; margin-bottom: 2rem;
            background: var(--surface); padding: 1.5rem 2rem; border-radius: 12px;
            border: 1px solid var(--border); position: relative;
        }
        .avatar-large { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }

        .stats-mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .stat-num { font-size: 1.5rem; font-weight: 700; color: white; }

        .xp-container { margin-bottom: 2rem; }
        .xp-bar-bg { width: 100%; height: 10px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .xp-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s ease; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
        .card-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 15px; border-bottom: 1px solid var(--border); 
            background: rgba(255, 255, 255, 0.02); margin-bottom: 5px; border-radius: 8px;
        }

        .poll-option-container { position: relative; margin-bottom: 12px; cursor: pointer; }
        .poll-option-bg { background: var(--bg); height: 50px; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .poll-option-fill { background: var(--accent); opacity: 0.2; height: 100%; transition: width 0.8s ease; }
        .poll-option-label { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-weight: 600; }

        @media (max-width: 800px) {
            main { margin-left: 0; padding: 1.5rem 1rem 100px 1rem; }
            .stats-mini-grid { grid-template-columns: 1fr 1fr; }
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="profile.html" class="logo"><img src="logo-felix.png"><span>FEL-X</span></a>
        <a href="profile.html" class="nav-link active">Profil</a>
        <a href="leaderboard.html" class="nav-link">Classement</a>
        <a href="clips.html" class="nav-link">Clips</a>
        <a href="stats.html" class="nav-link">Stats</a>
        <a href="#" id="logout-btn" class="nav-link logout">Déconnexion</a>
    </nav>

    <main>
        <div id="loading-overlay">
            <h2>Initialisation...</h2>
            <p>Calcul des sessions d'XP</p>
        </div>

        <div class="profile-header">
            <img id="avatar" class="avatar-large" src="">
            <div style="flex-grow:1;">
                <h1 id="username">Chargement...</h1>
                <div id="rank" style="color:var(--text-dim);">Rang #--</div>
                <div id="badges-container" style="display:flex; gap:5px; margin-top:5px;"></div>
            </div>
        </div>

        <div class="xp-container">
            <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:5px;">
                <span style="font-weight:bold;">NIVEAU <span id="stat-level-text">1</span></span>
                <span><span id="current-xp">0</span> / <span id="next-level-xp">100</span> XP</span>
            </div>
            <div class="xp-bar-bg"><div class="xp-fill" id="xp-fill"></div></div>
        </div>

        <div class="stats-mini-grid">
            <div class="stat-box"><div style="font-size:0.7rem; color:var(--text-dim); text-transform:uppercase;">Niveau</div><div class="stat-num" id="stat-level">1</div></div>
            <div class="stat-box"><div style="font-size:0.7rem; color:var(--text-dim); text-transform:uppercase;">Watchtime</div><div class="stat-num" id="stat-watchtime">-</div></div>
            <div class="stat-box"><div style="font-size:0.7rem; color:var(--text-dim); text-transform:uppercase;">XP Total</div><div class="stat-num" id="stat-xp">0</div></div>
            <div class="stat-box"><div style="font-size:0.7rem; color:var(--text-dim); text-transform:uppercase;">Abonnement</div><div class="stat-num" id="stat-sub">...</div></div>
        </div>

        <div class="id-card" style="background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;">
            <div style="color:var(--accent); font-weight:bold; margin-bottom:15px;">🐾 LE FÉLIX-LOG</div>
            <div style="display:grid; grid-template-columns: 1fr 2fr; gap:15px;">
                <div class="stat-box" style="background:rgba(0,0,0,0.2);"><div style="font-size:0.7rem;">Humeur</div><div id="felix-mood" style="font-weight:bold;">Analyse...</div></div>
                <div class="stat-box" style="background:rgba(0,0,0,0.2);"><div style="font-size:0.7rem;">Observation</div><div id="felix-observation" style="font-style:italic;">"Je t'observe..."</div></div>
            </div>
        </div>

        <div class="main-grid">
            <div class="card-panel">
                <h3 style="color:var(--accent); margin-top:0;">📜 Historique XP (Sessions 12h)</h3>
                <ul class="history-list" id="xp-history-list"></ul>
            </div>
            <div class="card-panel" id="poll-container" style="display:none;">
                <h3 style="color:var(--accent); margin-top:0;">📊 Sondage</h3>
                <p id="poll-question" style="font-weight:bold;"></p>
                <div id="poll-options"></div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>

    <script>
        // 1. DÉCLARATION GLOBALE (Pour éviter CLIENT_ID_VERCEL is not defined)
        const CLIENT_ID_VERCEL = "kgyfzs0k3wk8enx7p3pd6299ro4izv";
        const BROADCASTER_NAME = "masthom_";
        var db = firebase.database();
        var userVote = null;
        var currentPollData = null;

        // --- HELPERS ---
        function sanitize(k) { return k ? k.toString().replace(/\//g, "-").replace(/\./g, "_").replace(/[\$#\[\]]/g, "") : ""; }
        
        function parseDate(ts) {
            if (!ts) return Date.now();
            if (typeof ts === 'string') return new Date(ts.replace(' ', 'T')).getTime();
            return ts;
        }

        function formatDate(ts) {
            const d = new Date(ts);
            if (isNaN(d.getTime())) return "Date inconnue";
            return d.toLocaleDateString('fr-FR') + " " + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        }

        // --- UI SONDAGE ---
        window.refreshPollUI = function() {
            const poll = currentPollData;
            const container = document.getElementById('poll-container');
            const optionsDiv = document.getElementById('poll-options');
            if (!poll || !poll.active) { if(container) container.style.display = 'none'; return; }
            container.style.display = 'block';
            document.getElementById('poll-question').textContent = poll.question;
            optionsDiv.innerHTML = "";
            poll.options.forEach(option => {
                const safeKey = sanitize(option);
                const percent = (poll.stats && poll.stats[safeKey]) ? poll.stats[safeKey] : 0;
                const isMyVote = (userVote === option);
                const wrapper = document.createElement('div');
                wrapper.className = "poll-option-container";
                wrapper.innerHTML = `
                    <div class="poll-option-bg" style="border-color: ${isMyVote ? 'var(--accent)' : 'var(--border)'}">
                        <div class="poll-option-fill" style="width: ${percent}%;"></div>
                        <div class="poll-option-label"><span>${isMyVote ? '✅ ' : ''}${option}</span><span>${percent}%</span></div>
                    </div>`;
                wrapper.onclick = () => window.castVote(poll.id, option);
                optionsDiv.appendChild(wrapper);
            });
        };

        window.castVote = async function(pId, opt) {
            const name = localStorage.getItem('twitch_username');
            if (!name || !db) return;
            userVote = opt; window.refreshPollUI();
            try {
                await db.ref('poll_incoming_votes/' + name).set({ poll_id: pId, option: opt, username: name, timestamp: firebase.database.ServerValue.TIMESTAMP });
                await db.ref('user_persistent_votes/' + name).set({ poll_id: pId, option: opt });
            } catch (e) { console.error("❌ Erreur Vote:", e); }
        };

        // --- CHARGEMENT PRINCIPAL ---
        document.addEventListener("DOMContentLoaded", async () => {
            const loader = document.getElementById("loading-overlay");
            const token = checkAuth(); // Défini dans app.js
            if (!token) return;

            try {
                // Twitch API
                const headers = { 'Authorization': `Bearer ${token}`, 'Client-Id': CLIENT_ID_VERCEL };
                const userResp = await fetch('https://api.twitch.tv/helix/users', { headers });
                const userData = await userResp.json();
                const user = userData.data[0];
                const userKey = user.login.toLowerCase();
                localStorage.setItem('twitch_username', userKey);

                document.getElementById("username").textContent = user.display_name;
                document.getElementById("avatar").src = user.profile_image_url;

                if(loader) loader.style.display = "none";

                // --- WATCHTIME (SOLID TOTAL) ---
                db.ref('viewer_data/stats_perma/' + userKey).on('value', snap => {
                    const s = snap.val();
                    if (s && s.total_presence_minutes !== undefined) {
                        const h = Math.floor(s.total_presence_minutes / 60);
                        const m = s.total_presence_minutes % 60;
                        document.getElementById("stat-watchtime").textContent = `${h}h ${m}m`;
                    }
                });

                // --- XP & NIVEAU ---
                db.ref('viewer_data/xp_data/' + userKey).on('value', snap => {
                    const data = snap.val();
                    let xp = (data && typeof data === 'object') ? (data.xp || 0) : (data || 0);
                    const level = calculateLevel(xp); // Défini dans app.js
                    document.getElementById("stat-level").textContent = level;
                    document.getElementById("stat-level-text").textContent = level;
                    document.getElementById("stat-xp").textContent = xp.toLocaleString();
                    const nextXp = Math.floor(100 * Math.pow(level, 2.2));
                    const currXp = Math.floor(100 * Math.pow(level - 1, 2.2));
                    const prog = ((xp - currXp) / (nextXp - currXp)) * 100;
                    document.getElementById("xp-fill").style.width = Math.min(100, Math.max(0, prog)) + "%";
                });

                // --- HISTORIQUE SESSIONS 12H ---
                db.ref('viewer_data/history/' + userKey).limitToLast(1000).on('value', snap => {
                    const data = snap.val();
                    const list = document.getElementById("xp-history-list");
                    if (!data) { list.innerHTML = "<li>Aucun historique ✨</li>"; return; }

                    // 1. Normalisation et Tri
                    let allItems = Object.values(data).map(item => ({
                        reason: (item.reason || "xp").toLowerCase().trim(),
                        amount: parseInt(item.amount) || 0,
                        timestamp: parseDate(item.timestamp),
                        duration: parseInt(item.duration) || 10
                    })).sort((a, b) => b.timestamp - a.timestamp);

                    // 2. Groupement par Session 12h
                    const grouped = [];
                    if (allItems.length > 0) {
                        let current = { ...allItems[0], count: 1 };
                        for (let i = 1; i < allItems.length; i++) {
                            let item = allItems[i];
                            let diff = Math.abs(current.timestamp - item.timestamp);
                            const GAP_12H = 12 * 60 * 60 * 1000;

                            if (item.reason === current.reason && diff < GAP_12H) {
                                current.amount += item.amount;
                                current.duration += (item.duration || 0);
                                current.count++;
                            } else {
                                grouped.push(current);
                                current = { ...item, count: 1 };
                            }
                        }
                        grouped.push(current);
                    }

                    // 3. Rendu
                    list.innerHTML = "";
                    grouped.slice(0, 40).forEach(item => {
                        let label = "✨ Action", color = "#00ffcc", detail = "";
                        const r = item.reason;
                        if (r.includes('presence')) { label = "🎬 Session Stream"; color = "#94a3b8"; detail = `${item.duration} min`; }
                        else if (r.includes('message')) { label = "💬 Activité Chat"; color = "#60a5fa"; detail = `${item.count} messages`; }
                        else if (r.includes('sub')) { label = "⭐ Abonnement"; color = "#fbbf24"; }
                        else if (r.includes('bits')) { label = "💎 Bits"; color = "#c084fc"; }

                        list.innerHTML += `
                        <li class="history-item" style="border-left: 4px solid ${color};">
                            <div>
                                <div style="font-weight:bold; color:white;">${label}</div>
                                <div style="font-size:0.75rem; color:var(--text-dim);">${formatDate(item.timestamp)} ${detail ? '• '+detail : ''}</div>
                            </div>
                            <div style="font-weight:bold; color:${color};">+${item.amount.toLocaleString()} XP</div>
                        </li>`;
                    });
                });

                // --- VOTES & LOGS ---
                db.ref('current_poll').on('value', snap => { currentPollData = snap.val(); window.refreshPollUI(); });
                db.ref('viewer_logs/' + userKey).on('value', snap => {
                    const log = snap.val();
                    if (log) {
                        document.getElementById("felix-mood").textContent = log.mood || "Analyse...";
                        document.getElementById("felix-observation").textContent = `"${log.last_comment}"`;
                    }
                });

            } catch (e) {
                console.error("❌ Erreur:", e);
                if(loader) loader.style.display = "none";
            }
        });
    </script>
</body>
</html>
