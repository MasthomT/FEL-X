<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
				<title>Mon Profil - FEL-X</title>
				<!-- On utilise le style.css Master pour la cohérence totale -->
				<link rel="stylesheet" href="style.css">
					<style>
						/* Animations et ajustements spécifiques au profil */
						@keyframes glow {
						from { box-shadow: 0 0 5px var(--accent-glow); }
						to { box-shadow: 0 0 20px var(--accent-glow); }
						}

						#xp-fill {
						transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
						box-shadow: 0 0 15px var(--accent-glow);
						}

						.avatar-container {
						position: relative;
						flex-shrink: 0;
						}

						.avatar-main {
						width: 120px;
						height: 120px;
						border-radius: 32px;
						border: 2px solid var(--accent);
						object-fit: cover;
						background: var(--bg);
						box-shadow: 0 10px 25px rgba(0,0,0,0.5);
						}

						.rank-badge {
						position: absolute;
						bottom: -10px;
						right: -10px;
						background: var(--accent);
						color: #000;
						padding: 6px 14px;
						border-radius: 14px;
						font-weight: 900;
						font-size: 0.85rem;
						border: 4px solid var(--bg);
						box-shadow: 0 5px 15px rgba(0,0,0,0.3);
						}

						.xp-label {
						font-size: 0.7rem;
						font-weight: 800;
						text-transform: uppercase;
						color: var(--text-dim);
						letter-spacing: 1px;
						}

						.ai-val {
						font-weight: 700;
						font-size: 1.1rem;
						color: #fff;
						margin-top: 4px;
						}

						.note-card {
						grid-column: 1 / -1;
						background: rgba(0, 245, 195, 0.03);
						padding: 1.5rem;
						border-radius: 20px;
						border: 1px solid rgba(0, 245, 195, 0.1);
						}

						#loader {
						display: flex;
						flex-direction: column;
						align-items: center;
						justify-content: center;
						height: 60vh;
						}

						@keyframes spin { to { transform: rotate(360deg); } }
					</style>
				</head>
	<body>
		<!-- La sidebar est injectée ici par sidebar.js -->

		<main id="main-content">
			<!-- Loader Minimaliste -->
			<div id="loader">
				<div style="width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
				<p style="margin-top: 20px; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; font-size: 0.8rem; text-transform: uppercase;">Récupération de tes données...</p>
			</div>

			<!-- Contenu réel -->
			<div id="profile-container" style="display: none;">
				<header>
					<h1 id="display-name">Chargement...</h1>
					<p class="page-desc">Ton espace personnel et tes statistiques de progression.</p>
				</header>

				<!-- Section 1 : Identité & Niveau -->
				<div class="card" style="display: flex; align-items: center; gap: 3.5rem; flex-wrap: wrap;">
					<div class="avatar-container">
						<img id="user-avatar" src="" alt="Avatar" class="avatar-main">
							<div id="rank-text" class="rank-badge">RANG #--</div>
						</div>

					<div style="flex-grow: 1; min-width: 300px;">
						<div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px;">
							<div>
								<span class="xp-label" style="color: var(--accent);">Progression Actuelle</span>
								<span style="font-size: 3rem; font-weight: 900; color: #fff; line-height: 1; display: block;">
									LVL <span id="level-num">1</span>
								</span>
							</div>
							<div style="text-align: right;">
								<span style="color: #fff; font-weight: 800; font-size: 1.2rem;">
									<span id="xp-current">0</span>
									<span style="color: var(--text-dim); font-size: 0.9rem; font-weight: 400; margin: 0 5px;">/</span>
									<span id="xp-next">100</span>
								</span>
								<span class="xp-label" style="display: block; margin-top: 4px;">Points d'expérience</span>
							</div>
						</div>
						<div style="width: 100%; height: 14px; background: rgba(0,0,0,0.3); border-radius: 20px; overflow: hidden; border: 1px solid var(--border);">
							<div id="xp-fill" style="height: 100%; width: 0%; background: var(--accent); border-radius: 20px;"></div>
						</div>
					</div>
				</div>

				<!-- Section 2 : Statistiques -->
				<div class="grid">
					<div class="stat-box">
						<div class="stat-label">Messages</div>
						<div id="stat-messages" class="stat-value">0</div>
					</div>
					<div class="stat-box">
						<div class="stat-label">Watchtime</div>
						<div id="stat-watchtime" class="stat-value">0h 00m</div>
					</div>
					<div class="stat-box">
						<div class="stat-label">Points Totaux</div>
						<div id="stat-points" class="stat-value" style="color: var(--accent);">0</div>
					</div>
				</div>

				<!-- Section 3 : Identité IA (Félix) -->
				<h2 style="font-size: 0.85rem; font-weight: 800; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; margin: 4rem 0 1.5rem 0.5rem; display: flex; align-items: center; gap: 12px;">
					<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
						<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
					</svg>
					Le Cerveau de Félix
				</h2>

				<div class="card" id="ai-context-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 2.5rem;">
					<!-- Injecté par JS -->
				</div>

				<!-- Section 4 : Historique -->
				<h2 style="font-size: 0.85rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); letter-spacing: 2px; margin: 4rem 0 1.5rem 0.5rem;">📜 Activité Récente</h2>
				<div class="card" style="padding: 0; overflow: hidden;">
					<table style="margin-top: 0;">
						<thead>
							<tr>
								<th style="padding-left: 2.5rem;">Date</th>
								<th>Événement</th>
								<th style="text-align: right; padding-right: 2.5rem;">EXP</th>
							</tr>
						</thead>
						<tbody id="history-rows">
							<!-- Injecté par JS -->
						</tbody>
					</table>
				</div>
			</div>
		</main>

		<script src="config.js"></script>
		<script src="app.js"></script>
		<script src="sidebar.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", async () => {
			const token = checkAuth();
			if (!token) return;

			const API_URL = CONFIG.API_BASE_URL;
			const CLIENT_ID = CONFIG.CLIENT_ID;

			try {
			// 1. Récupération des infos Twitch
			const userResp = await fetch('https://api.twitch.tv/helix/users', {
			headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CLIENT_ID }
			});
			const userData = await userResp.json();
			if(!userData.data || userData.data.length === 0) throw new Error("Utilisateur introuvable");

			const user = userData.data[0];
			document.getElementById("display-name").textContent = user.display_name;
			document.getElementById("user-avatar").src = user.profile_image_url;

			// 2. Récupération des données du Bot (Raspberry Pi)
			const botResp = await fetch(`${API_URL}/viewer/${user.id}`, {
			headers: { "ngrok-skip-browser-warning": "true" }
			});

			if (botResp.ok) {
			const data = await botResp.json();

			// --- NIVEAUX ET XP ---
			const xp = data.points || 0;
			const level = calculateLevel(xp);
			const nextXp = Math.floor(100 * Math.pow(level, 2.2));
			const prevXp = level === 1 ? 0 : Math.floor(100 * Math.pow(level - 1, 2.2));
			const progress = ((xp - prevXp) / (nextXp - prevXp)) * 100;

			document.getElementById("level-num").textContent = level;
			document.getElementById("xp-current").textContent = xp.toLocaleString('fr-FR');
			document.getElementById("xp-next").textContent = nextXp.toLocaleString('fr-FR');

			// Animation fluide de la barre
			setTimeout(() => {
			document.getElementById("xp-fill").style.width = Math.min(100, Math.max(0, progress)) + "%";
			}, 300);

			// --- STATS ---
			document.getElementById("stat-messages").textContent = (data.messages || 0).toLocaleString('fr-FR');
			const h = Math.floor((data.watchtime || 0) / 3600);
			const m = Math.floor(((data.watchtime || 0) % 3600) / 60);
			document.getElementById("stat-watchtime").textContent = `${h}h ${m.toString().padStart(2, '0')}m`;
			document.getElementById("stat-points").textContent = xp.toLocaleString('fr-FR');
			document.getElementById("rank-text").textContent = `RANG #${data.rank || '--'}`;

			// --- CONTEXTE IA ---
			// On affiche les deux pseudos : Le tien et celui de Félix
			document.getElementById("ai-context-grid").innerHTML = `
			<div>
				<span class="stat-label">Comment Félix t'appelle</span>
				<div class="ai-val">${data.nickname || user.display_name}</div>
			</div>
			<div>
				<span class="stat-label">Comment tu appelles Félix</span>
				<div class="ai-val">${data.nickname_for_bot || 'Chef'}</div>
			</div>
			<div>
				<span class="stat-label">Ta Vibe</span>
				<div class="ai-val">${data.vibe || 'Analyse en cours...'}</div>
			</div>
			<div>
				<span class="stat-label">Jeu favori</span>
				<div class="ai-val">${data.favorite_game || 'Non défini'}</div>
			</div>
			<div class="note-card">
				<span class="stat-label" style="color:var(--accent); margin-bottom:10px; display:block;">Mémoire de Félix</span>
				<p style="font-style:italic; font-size:1rem; line-height:1.6; color:#cbd5e1;">
					"${data.free_message || 'Félix t\'observe avec une curiosité silencieuse...'}"
				</p>
			</div>
			`;

			// --- HISTORIQUE ---
			const historyContainer = document.getElementById("history-rows");
			if (data.history && data.history.length > 0) {
			historyContainer.innerHTML = data.history.map(log => {
			const dateObj = new Date(log.timestamp.replace(" ", "T"));
			const dateStr = dateObj.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
			return `
			<tr>
				<td style="padding-left: 2.5rem; color: var(--text-dim); font-size: 0.85rem;">${dateStr}</td>
				<td style="font-weight:700; color:#fff;">${log.event_type.toUpperCase()}</td>
				<td style="text-align:right; padding-right: 2.5rem; color:var(--accent); font-weight:900; font-family:'JetBrains Mono', monospace;">+${log.amount}</td>
			</tr>
			`;
			}).join('');
			} else {
			historyContainer.innerHTML = `<tr>
				<td colspan="3" style="text-align:center; padding: 4rem; color: var(--text-dim); font-style:italic;">Aucune activité enregistrée pour le moment.</td>
			</tr>`;
			}
			}

			// Affichage final
			document.getElementById("loader").style.display = "none";
			document.getElementById("profile-container").style.display = "block";

			} catch (e) {
			console.error(e);
			document.getElementById("loader").innerHTML = `
			<div style="text-align:center;">
				<p style="color:var(--danger); font-weight:bold; font-size:1.2rem;">Oups ! Connexion au Bot impossible.</p>
				<p style="color:var(--text-dim); margin-top:10px;">Vérifie que ton Raspberry Pi est allumé et que Ngrok tourne.</p>
			</div>
			`;
			}
			});
		</script>
	</body>
</html>
