<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Profil - FEL-X</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        main { padding: 2rem; margin-left: 240px; min-height: 100vh; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .profile-header {
            display: flex; align-items: center; gap: 25px; margin-bottom: 2rem;
            background: var(--surface); padding: 1.5rem 2rem; border-radius: 12px;
            border: 1px solid var(--border); position: relative;
        }
        .profile-header::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 4px; background: var(--accent); border-radius: 12px 0 0 12px;
        }

        #username { color: white; margin: 0; font-size: 2rem; font-weight: 700; }
        .avatar-large { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }

        .stats-mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .stat-title { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; }
        .stat-num { font-size: 1.5rem; font-weight: 700; color: white; }

        .xp-container { margin-bottom: 2rem; }
        .xp-bar-bg { width: 100%; height: 10px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .xp-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s ease; }

        .id-card, .card-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .id-title, .panel-title { color: var(--accent); font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 14px; border-left: 4px solid var(--accent); 
            background: rgba(255, 255, 255, 0.03); margin-bottom: 8px; border-radius: 10px;
        }

        .poll-option-container { position: relative; margin-bottom: 12px; cursor: pointer; }
        .poll-option-bg { background: var(--bg); height: 50px; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .poll-option-fill { background: var(--accent); opacity: 0.2; height: 100%; transition: width 0.8s ease; }
        .poll-option-label { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-weight: 600; }

        @media (max-width: 800px) {
            main { margin-left: 0; padding: 1rem; padding-bottom: 100px; }
            .stats-mini-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .profile-header { flex-direction: column; text-align: center; }
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <h2>Initialisation...</h2>
        <p>Synchronisation avec Félix</p>
    </div>

    <nav class="sidebar">
        <a href="profile.html" class="logo"><img src="logo-felix.png"><span>FEL-X</span></a>
        <a href="profile.html" class="nav-link active">Profil</a>
        <a href="leaderboard.html" class="nav-link">Classement</a>
        <a href="clips.html" class="nav-link">Clips</a>
        <a href="stats.html" class="nav-link">Stats</a>
        <a href="felix.html" class="nav-link">Félix et moi</a>
        <a href="#" id="logout-btn" class="nav-link logout">Déconnexion</a>
    </nav>

    <main>
        <div class="profile-header">
            <img id="avatar" class="avatar-large" src="">
            <div style="flex-grow:1;">
                <h1 id="username">Chargement...</h1>
                <div id="rank" style="color:var(--text-dim);">Rang #--</div>
                <div id="badges-container" class="badges-list"></div>
            </div>
        </div>

        <div class="xp-container">
            <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:8px;">
                <span style="font-weight:bold; color:white;">NIVEAU <span id="stat-level-text">1</span></span>
                <span><span id="current-xp">0</span> / <span id="next-level-xp">100</span> XP</span>
            </div>
            <div class="xp-bar-bg"><div class="xp-fill" id="xp-fill"></div></div>
        </div>

        <div class="stats-mini-grid">
            <div class="stat-box"><div class="stat-title">Niveau</div><div class="stat-num" id="stat-level">1</div></div>
            <div class="stat-box"><div class="stat-title">Watchtime</div><div class="stat-num" id="stat-watchtime">-</div></div>
            <div class="stat-box"><div class="stat-title">XP Total</div><div class="stat-num" id="stat-xp">0</div></div>
            <div class="stat-box"><div class="stat-title">Abonnement</div><div class="stat-num" id="stat-sub">...</div></div>
        </div>

        <div class="id-card">
            <div class="id-title">🐾 LE FÉLIX-LOG</div>
            <div style="display:grid; grid-template-columns: 1fr 2fr; gap:15px;">
                <div class="stat-box" style="background: rgba(0,0,0,0.2);"><div class="id-label">Humeur</div><div id="felix-mood" class="id-value" style="border:none;">Analyse...</div></div>
                <div class="stat-box" style="background: rgba(0,0,0,0.2);"><div class="id-label">Observation</div><div id="felix-observation" class="id-value" style="border:none; font-style:italic;">"..."</div></div>
            </div>
        </div>

        <div class="main-grid">
            <div class="card-panel">
                <h3 class="panel-title">📜 Historique des Sessions</h3>
                <ul class="history-list" id="xp-history-list"></ul>
            </div>
            <div class="card-panel" id="poll-container" style="display:none;">
                <h3 class="panel-title">📊 Sondage</h3>
                <p id="poll-question" style="font-weight:bold;"></p>
                <div id="poll-options"></div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>

    <script>
        // 1. DÉCLARATION DES VARIABLES GLOBALES
        const CLIENT_ID_VERCEL = "kgyfzs0k3wk8enx7p3pd6299ro4izv";
        const BROADCASTER_NAME = "masthom_";
        var db = firebase.database();
        var userVote = null;
        var currentPollData = null;

        function sanitize(k) { return k ? k.toString().replace(/\//g, "-").replace(/\./g, "_").replace(/[\$#\[\]]/g, "") : ""; }
        
        function formatDate(ts) {
            const d = new Date(ts);
            if (isNaN(d.getTime())) return "Date inconnue";
            return d.toLocaleDateString('fr-FR') + " " + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        }

        // --- SONDAGES ---
        window.refreshPollUI = function() {
            const poll = currentPollData;
            const container = document.getElementById('poll-container');
            const optionsDiv = document.getElementById('poll-options');
            if (!poll || !poll.active) { if(container) container.style.display = 'none'; return; }
            container.style.display = 'block';
            document.getElementById('poll-question').textContent = poll.question;
            optionsDiv.innerHTML = "";
            poll.options.forEach(option => {
                const percent = (poll.stats && poll.stats[sanitize(option)]) ? poll.stats[sanitize(option)] : 0;
                const isMyVote = (userVote === option);
                const wrapper = document.createElement('div');
                wrapper.className = "poll-option-container";
                wrapper.innerHTML = `
                    <div class="poll-option-bg" style="border-color: ${isMyVote ? 'var(--accent)' : 'var(--border)'}">
                        <div class="poll-option-fill" style="width: ${percent}%;"></div>
                        <div class="poll-option-label"><span>${isMyVote ? '✅ ' : ''}${option}</span><span>${percent}%</span></div>
                    </div>`;
                wrapper.onclick = () => window.castVote(poll.id, option);
                optionsDiv.appendChild(wrapper);
            });
        };

        window.castVote = async function(pId, opt) {
            const name = localStorage.getItem('twitch_username');
            if (!name || !db) return;
            userVote = opt; window.refreshPollUI();
            try {
                await db.ref('poll_incoming_votes/' + name).set({ poll_id: pId, option: opt, username: name, timestamp: firebase.database.ServerValue.TIMESTAMP });
                await db.ref('user_persistent_votes/' + name).set({ poll_id: pId, option: opt });
            } catch (e) { console.error(e); }
        };

        // --- CHARGEMENT ---
        document.addEventListener("DOMContentLoaded", async () => {
            const token = checkAuth();
            if (!token) return;

            try {
                const headers = { 'Authorization': `Bearer ${token}`, 'Client-Id': CLIENT_ID_VERCEL };
                const userResp = await fetch('https://api.twitch.tv/helix/users', { headers });
                const userData = await userResp.json();
                const user = userData.data[0];
                const userKey = user.login.toLowerCase();
                localStorage.setItem('twitch_username', userKey);

                document.getElementById("username").textContent = user.display_name;
                document.getElementById("avatar").src = user.profile_image_url;
                document.getElementById("loading-overlay").style.display = "none";

                // Watchtime & XP
                db.ref('viewer_data/stats_perma/' + userKey).on('value', snap => {
                    const min = snap.val()?.total_presence_minutes || 0;
                    document.getElementById("stat-watchtime").textContent = Math.floor(min/60) + "h " + (min%60) + "m";
                });

                db.ref('viewer_data/xp_data/' + userKey).on('value', snap => {
                    const xp = snap.val()?.xp || snap.val() || 0;
                    const level = calculateLevel(xp);
                    document.getElementById("stat-level").textContent = level;
                    document.getElementById("stat-level-text").textContent = level;
                    document.getElementById("stat-xp").textContent = xp.toLocaleString();
                    document.getElementById("current-xp").textContent = xp.toLocaleString();
                    
                    const nextXp = Math.floor(100 * Math.pow(level, 2.2));
                    const currXp = Math.floor(100 * Math.pow(level - 1, 2.2));
                    const prog = ((xp - currXp) / (nextXp - currXp)) * 100;
                    document.getElementById("xp-fill").style.width = Math.min(100, prog) + "%";
                    document.getElementById("next-level-xp").textContent = nextXp.toLocaleString();
                });

                // HISTORIQUE FUSIONNÉ (C'est ici la correction !)
                db.ref('viewer_data/history_sessions/' + userKey).on('value', snap => {
                    const data = snap.val();
                    const list = document.getElementById("xp-history-list");
                    list.innerHTML = "";
                    if (!data) { list.innerHTML = "<li>Aucun historique trouvé.</li>"; return; }

                    Object.values(data).sort((a,b) => b.timestamp - a.timestamp).forEach(item => {
                        let activities = [];
                        if (item.duration > 0) activities.push(`🎬 Stream (${item.duration} min)`);
                        if (item.count > 0) activities.push(`💬 Chat (${item.count} msg)`);
                        if (activities.length === 0) activities.push("✨ Action");

                        list.innerHTML += `
                        <li class="history-item">
                            <div>
                                <div style="font-weight:700; color:white;">${activities.join(' + ')}</div>
                                <div style="font-size:0.75rem; color:var(--text-dim);">${formatDate(item.timestamp)}</div>
                            </div>
                            <div style="font-weight:800; color:var(--accent);">+${item.amount.toLocaleString()} XP</div>
                        </li>`;
                    });
                });

                // Logs & Sondages
                db.ref('current_poll').on('value', snap => { currentPollData = snap.val(); window.refreshPollUI(); });
                db.ref('viewer_logs/' + userKey).on('value', snap => {
                    const l = snap.val();
                    if(l) {
                        document.getElementById("felix-mood").textContent = l.mood || "Normal";
                        document.getElementById("felix-observation").textContent = `"${l.last_comment}"`;
                    }
                });

            } catch (e) { console.error(e); }
        });
    </script>
</body>
</html>
