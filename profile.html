<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
				<title>Mon Profil - FEL-X</title>
				<!-- On appelle le design maître que tu viens de valider -->
				<link rel="stylesheet" href="style.css">
					<style>
						/* Animations et ajustements spécifiques au profil */
						@keyframes glow {
						from { box-shadow: 0 0 5px var(--accent-glow); }
						to { box-shadow: 0 0 20px var(--accent-glow); }
						}
						#xp-fill {
						transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
						box-shadow: 0 0 15px var(--accent-glow);
						}
						.avatar-container {
						position: relative;
						flex-shrink: 0;
						}
						.avatar-main {
						width: 120px;
						height: 120px;
						border-radius: 24px;
						border: 2px solid var(--accent);
						object-fit: cover;
						background: var(--bg);
						}
						.rank-badge {
						position: absolute;
						bottom: -10px;
						right: -10px;
						background: var(--accent);
						color: #000;
						padding: 5px 12px;
						border-radius: 10px;
						font-weight: 900;
						font-size: 0.8rem;
						border: 4px solid var(--bg);
						}
					</style>
				</head>
	<body>
		<!-- La sidebar est injectée ici par sidebar.js -->

		<main id="main-content">
			<!-- Loader Minimaliste -->
			<div id="loader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh;">
				<div style="width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
				<p style="margin-top: 20px; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; font-size: 0.8rem; text-transform: uppercase;">Récupération de tes données...</p>
			</div>

			<!-- Contenu réel -->
			<div id="profile-container" style="display: none;">
				<header>
					<h1 id="display-name">Chargement...</h1>
					<p class="page-desc">Ton espace personnel et tes statistiques de stream.</p>
				</header>

				<!-- Section 1 : Identité Visuelle & Niveau -->
				<div class="card" style="display: flex; align-items: center; gap: 3rem; flex-wrap: wrap;">
					<div class="avatar-container">
						<img id="user-avatar" src="" alt="Avatar" class="avatar-main">
							<div id="rank-text" class="rank-badge">RANG #--</div>
						</div>

					<div style="flex-grow: 1; min-width: 300px;">
						<div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px;">
							<div>
								<span style="display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; margin-bottom: 5px;">Progression actuelle</span>
								<span style="font-size: 2.8rem; font-weight: 900; color: #fff; line-height: 1;">
									LVL <span id="level-num">1</span>
								</span>
							</div>
							<div style="text-align: right;">
								<span style="color: #fff; font-weight: 800; font-size: 1.1rem;">
									<span id="xp-current">0</span>
									<span style="color: var(--text-dim); font-size: 0.8rem; font-weight: 400; margin: 0 5px;">/</span>
									<span id="xp-next">100</span>
								</span>
								<span style="display: block; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px;">Points d'expérience</span>
							</div>
						</div>
						<div style="width: 100%; height: 12px; background: rgba(0,0,0,0.3); border-radius: 20px; overflow: hidden; border: 1px solid var(--border);">
							<div id="xp-fill" style="height: 100%; width: 0%; background: var(--accent); border-radius: 20px;"></div>
						</div>
					</div>
				</div>

				<!-- Section 2 : Grille de Statistiques -->
				<div class="grid">
					<div class="stat-box">
						<div class="stat-label">Messages</div>
						<div id="stat-messages" class="stat-value">0</div>
					</div>
					<div class="stat-box">
						<div class="stat-label">Watchtime</div>
						<div id="stat-watchtime" class="stat-value">0h 00m</div>
					</div>
					<div class="stat-box">
						<div class="stat-label">Points Totaux</div>
						<div id="stat-points" class="stat-value" style="color: var(--accent);">0</div>
					</div>
				</div>

				<!-- Section 3 : Cerveau de Félix (IA) -->
				<h2 style="font-size: 0.85rem; font-weight: 800; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; margin: 3rem 0 1.5rem 0.5rem; display: flex; align-items: center; gap: 10px;">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
						<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
					</svg>
					Félix se souvient de toi
				</h2>
				<div class="card" id="ai-context-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2.5rem;">
					<!-- Injecté par JS -->
				</div>

				<!-- Section 4 : Historique -->
				<h2 style="font-size: 0.85rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); letter-spacing: 2px; margin: 3rem 0 1.5rem 0.5rem;">📜 Activité Récente</h2>
				<div class="card" style="padding: 0; overflow: hidden;">
					<table style="margin-top: 0;">
						<thead>
							<tr>
								<th style="padding-left: 2rem;">Date</th>
								<th>Événement</th>
								<th style="text-align: right; padding-right: 2rem;">EXP</th>
							</tr>
						</thead>
						<tbody id="history-rows">
							<!-- Injecté par JS -->
						</tbody>
					</table>
				</div>
			</div>
		</main>

		<script src="config.js"></script>
		<script src="app.js"></script>
		<script src="sidebar.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", async () => {
			const token = checkAuth();
			if (!token) return;

			try {
			// 1. Twitch Info
			const userResp = await fetch('https://api.twitch.tv/helix/users', {
			headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CONFIG.CLIENT_ID }
			});
			const userData = await userResp.json();
			const user = userData.data[0];

			document.getElementById("display-name").textContent = user.display_name;
			document.getElementById("user-avatar").src = user.profile_image_url;

			// 2. Bot Data (Raspberry Pi)
			const botResp = await fetch(`${CONFIG.API_BASE_URL}/viewer/${user.id}`, {
			headers: { "ngrok-skip-browser-warning": "true" }
			});

			if (botResp.ok) {
			const data = await botResp.json();

			// Niveaux
			const xp = data.points || 0;
			const level = calculateLevel(xp);
			const nextXp = Math.floor(100 * Math.pow(level, 2.2));
			const prevXp = Math.floor(100 * Math.pow(level - 1, 2.2));
			const progress = ((xp - prevXp) / (nextXp - prevXp)) * 100;

			document.getElementById("level-num").textContent = level;
			document.getElementById("xp-current").textContent = xp.toLocaleString('fr-FR');
			document.getElementById("xp-next").textContent = nextXp.toLocaleString('fr-FR');
			setTimeout(() => { document.getElementById("xp-fill").style.width = Math.min(100, Math.max(0, progress)) + "%"; }, 200);

			// Stats
			document.getElementById("stat-messages").textContent = (data.messages || 0).toLocaleString('fr-FR');
			const h = Math.floor((data.watchtime || 0) / 3600);
			const m = Math.floor(((data.watchtime || 0) % 3600) / 60);
			document.getElementById("stat-watchtime").textContent = `${h}h ${m.toString().padStart(2, '0')}m`;
			document.getElementById("stat-points").textContent = xp.toLocaleString('fr-FR');
			document.getElementById("rank-text").textContent = `RANG #${data.rank || '--'}`;

			// IA Context
			document.getElementById("ai-context-grid").innerHTML = `
			<div>
				<span class="stat-label" style="margin-bottom:8px; display:block;">Ton Surnom IA</span>
				<div style="font-weight:700; font-size:1.1rem;">${data.nickname_for_bot || 'Non défini'}</div>
			</div>
			<div>
				<span class="stat-label" style="margin-bottom:8px; display:block;">Ta Vibe</span>
				<div style="font-weight:700; font-size:1.1rem;">${data.vibe || 'Analyse en cours...'}</div>
			</div>
			<div>
				<span class="stat-label" style="margin-bottom:8px; display:block;">Jeu de coeur</span>
				<div style="font-weight:700; font-size:1.1rem;">${data.favorite_game || 'Aucun'}</div>
			</div>
			<div style="grid-column: 1/-1; background: rgba(0,245,195,0.03); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--accent-glow);">
				<span class="stat-label" style="color:var(--accent); margin-bottom:10px; display:block;">Note secrète de Félix</span>
				<p style="font-style:italic; font-size:1rem; line-height:1.6; color:#e2e8f0;">"${data.free_message || 'Je t\'observe avec curiosité...'}"</p>
			</div>
			`;

			// History
			const historyContainer = document.getElementById("history-rows");
			if (data.history && data.history.length > 0) {
			data.history.forEach(log => {
			const tr = document.createElement("tr");
			const date = new Date(log.timestamp.replace(" ", "T")).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
			tr.innerHTML = `
			<td style="padding-left: 2rem; color: var(--text-dim); font-size: 0.85rem;">${date}</td>
			<td style="font-weight:700;">${log.event_type.toUpperCase()}</td>
			<td style="text-align:right; padding-right: 2rem; color:var(--accent); font-weight:900;">+${log.amount}</td>
			`;
			historyContainer.appendChild(tr);
			});
			} else {
			historyContainer.innerHTML = `<tr>
				<td colspan="3" style="text-align:center; padding: 3rem; color: var(--text-dim); italic;">Aucune activité enregistrée. Parle dans le chat !</td>
			</tr>`;
			}
			}

			document.getElementById("loader").style.display = "none";
			document.getElementById("profile-container").style.display = "block";
			} catch (e) {
			console.error(e);
			document.getElementById("loader").innerHTML = `<p style="color:var(--danger); font-weight:bold;">Erreur de connexion au Bot. Vérifie ton lien Ngrok !</p>`;
			}
			});
		</script>
	</body>
</html>
