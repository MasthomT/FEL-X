<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
				<title>Commandes - FEL-X</title>
				<link rel="stylesheet" href="style.css">
					<style>
						/* --- STYLE DESKTOP (PC) --- */
						main {
						padding: 2rem;
						margin-left: 250px; /* Aligné sur la sidebar PC */
						min-height: 100vh;
						}

						.controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
						.search-input { flex-grow: 1; padding: 12px; background: var(--surface); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: inherit; }
						.filter-select { padding: 12px; background: var(--surface); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: inherit; cursor: pointer; }

						/* Table Classique PC */
						table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; }
						th { text-align: left; padding: 15px; background: rgba(255,255,255,0.05); color: var(--text-dim); border-bottom: 2px solid var(--border); }
						td { padding: 15px; border-bottom: 1px solid var(--border); color: white; }
						.command-trigger { color: var(--accent); font-weight: bold; font-family: monospace; }

						/* --- OPTIMISATION MOBILE (< 800px) --- */
        @media (max-width: 800px) {
            main {
                margin-left: 0 !important; /* Retire le décalage Sidebar */
                padding: 1.5rem 1rem 100px 1rem !important; /* Espace TabBar */
            }

            .controls { flex-direction: column; }
            h1 { text-align: center; font-size: 1.6rem; }

            /* Transformation Table -> Cartes (Style Félix et moi) */
            table, thead, tbody, th, td, tr { display: block !important; width: 100% !important; }
            thead { display: none; } /* On cache les entêtes */

            tr {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 12px;
                margin-bottom: 1rem;
                box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            }

            /* Alignement Gauche (Label) / Droite (Valeur) */
            td {
        display: flex !important;
        flex-direction: column !important; /* On empile Label et Valeur pour plus de place */
        align-items: flex-start !important; /* Aligné à gauche comme Félix et moi */
        gap: 4px !important;
        padding: 12px 10px !important;
        border-bottom: 1px solid rgba(255,255,255,0.05) !important;
        text-align: left !important;
        background: transparent !important;
    }
            td:last-child { border-bottom: none !important; }

            /* Affichage du Label via data-label */
            td::before {
        content: attr(data-label);
        font-weight: 800;
        color: var(--accent);
        text-transform: uppercase;
        font-size: 0.65rem; /* Label plus petit pour laisser la place au texte */
        letter-spacing: 1px;
        opacity: 0.8;
    }
	td span, td code, td div {
        width: 100%;
        word-break: break-word; /* Force le retour à la ligne si un mot est trop long */
        font-size: 0.95rem;
        color: white;
    }
        }

        /* Styles Modal Admin */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal { background: var(--surface); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); width: 90%; max-width: 500px; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-dim); font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 6px; }
        .btn-save { background: var(--accent); color: #18181b; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
					</style>
				</head>
	<body>
		<nav class="sidebar">
			<a href="profile.html" class="logo">
				<img src="logo-felix.png">
					<span>FEL-X</span>
			</a>

			<a href="profile.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
				</svg> Profil
			</a>
			<a href="infos.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
				</svg> Infos
			</a>

			<a href="leaderboard.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M16 11V3H8v8H2v10h20V11h-6zm-6-6h4v14h-4V5zm-6 6h4v8H4v-8zm16 8h-4v-8h4v8z"/>
				</svg> Classement
			</a>

			<a href="clips.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
				</svg> Clips
			</a>
			<a href="commands.html" class="nav-link active">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
				</svg> Commandes
			</a>
			<a href="stats.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.03 0-4.43-.82-6.14-2.88a9.947 9.947 0 0 1 12.28 0C16.43 19.18 14.03 20 12 20z"/>
				</svg> Stats
			</a>
			<a href="felix.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
				</svg> Félix et moi
			</a>
			<a href="#" id="logout-btn" class="nav-link logout">Déconnexion</a>
		</nav>

		<main>
			<h1>📜 Commandes du Chat</h1>

			<div id="admin-panel" class="admin-controls">
				<button id="btn-add-cmd" class="btn-save" style="margin:0; width:auto;">+ Ajouter</button>
				<button id="btn-init-db" class="btn-cancel" style="margin-left:10px;">🔄 Restaurer la liste officielle</button>
			</div>

			<div class="controls">
				<input type="text" id="cmd-search" class="search-input" placeholder="Rechercher une commande...">
					<select id="cmd-filter" class="filter-select">
						<option value="all">Toutes les catégories</option>
						<option value="Infos">Infos</option>
						<option value="Traduction">Traduction</option>
						<option value="Emotes">Emotes</option>
						<option value="Sons">Sons</option>
						<option value="Modération">Modération</option>
						<option value="Chat Mode">Chat Mode</option>
						<option value="VIP">VIP</option>
						<option value="Timer">Timer</option>
						<option value="Game Bomb">Game Bomb</option>
					</select>
				</div>

			<div class="card">
				<table>
					<thead>
						<tr>
							<th width="25%">Commande</th>
							<th>Description</th>
							<th width="15%">Catégorie</th>
							<th width="15%">Accès</th>
							<th id="th-actions" style="display:none"></th>
						</tr>
					</thead>
					<tbody id="cmd-list"></tbody>
				</table>
			</div>
		</main>

		<div id="cmd-modal" class="modal-overlay">
			<div class="modal">
				<h2 id="modal-title">Ajouter une commande</h2>
				<form id="cmd-form">
					<input type="hidden" id="cmd-id">

						<div class="form-group">
							<label>Commande</label>
							<input type="text" id="in-trigger" required="" placeholder="Ex: !test">
						</div>
						<div class="form-group">
							<label>Description</label>
							<input type="text" id="in-desc" required="">
						</div>

						<div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
							<div class="form-group">
								<label>Catégorie</label>
								<select id="in-cat">
									<option value="Infos">Infos</option>
									<option value="Traduction">Traduction</option>
									<option value="Emotes">Emotes</option>
									<option value="Sons">Sons</option>
									<option value="Modération">Modération</option>
									<option value="Chat Mode">Chat Mode</option>
									<option value="VIP">VIP</option>
									<option value="Timer">Timer</option>
									<option value="Game Bomb">Game Bomb</option>
								</select>
							</div>
							<div class="form-group">
								<label>Accès</label>
								<select id="in-access">
									<option value="Viewer">Viewer</option>
									<option value="Modérateur">Modérateur</option>
									<option value="Streamer">Streamer</option>
								</select>
							</div>
						</div>

						<div class="modal-actions">
							<button type="button" class="btn-cancel" onclick="closeModal()">Annuler</button>
							<button type="submit" class="btn-save">Sauvegarder</button>
						</div>
					</form>
			</div>
		</div>

		<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
		<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
		<script src="app.js"></script>
		<script src="commands.js"></script>
	</body>
</html>
