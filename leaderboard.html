<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
				<title>Classement - FEL-X</title>
				<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
					<style>
						:root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #f8fafc; --text-dim: #94a3b8; --accent: #8b5cf6; --accent-green: #10b981; }
						body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
						main { padding: 2rem; margin-left: 240px; min-height: 100vh; }

						/* Loading Overlay */
						#loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
						.spinner { width: 50px; height: 50px; border: 5px solid var(--surface); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
						@keyframes spin { to { transform: rotate(360deg); } }

						/* Sidebar */
						.sidebar { position: fixed; top: 0; left: 0; width: 240px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
						.sidebar .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; font-size: 1.5rem; font-weight: 800; margin-bottom: 30px; }
						.sidebar .logo img { width: 40px; border-radius: 50%; }
						.nav-link { color: var(--text-dim); text-decoration: none; padding: 12px 15px; border-radius: 10px; font-weight: 600; transition: 0.2s; display: block; margin-bottom: 5px; }
						.nav-link:hover, .nav-link.active { background: rgba(139, 92, 246, 0.1); color: var(--accent); }
						.logout { color: #f43f5e; margin-top: auto; }
						.logout:hover { background: rgba(244, 63, 94, 0.1); color: #f43f5e; }

						/* Podium */
						.podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin-bottom: 3rem; padding-top: 3rem; }
						.podium-item { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 1.5rem; text-align: center; position: relative; width: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
						.podium-avatar { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--border); object-fit: cover; position: absolute; top: -35px; background: var(--bg); }

						.place-1 { height: 220px; border-color: #fbbf24; background: linear-gradient(to top, rgba(251, 191, 36, 0.15), var(--surface)); z-index: 10; box-shadow: 0 -10px 30px rgba(251, 191, 36, 0.2); }
						.place-1 .podium-avatar { border-color: #fbbf24; width: 90px; height: 90px; top: -45px; }
						.place-2 { height: 180px; border-color: #94a3b8; background: linear-gradient(to top, rgba(148, 163, 184, 0.15), var(--surface)); }
						.place-2 .podium-avatar { border-color: #94a3b8; }
						.place-3 { height: 150px; border-color: #b45309; background: linear-gradient(to top, rgba(180, 83, 9, 0.15), var(--surface)); }
						.place-3 .podium-avatar { border-color: #b45309; }

						.podium-rank { font-size: 4rem; font-weight: 800; opacity: 0.1; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); line-height: 1; }
						.podium-name { font-weight: 800; font-size: 1.1rem; margin-top: 15px; position: relative; z-index: 2; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
						.podium-xp { color: var(--accent); font-weight: 800; font-size: 1.2rem; position: relative; z-index: 2; }

						/* Table */
						.table-container { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
						table { width: 100%; border-collapse: collapse; text-align: left; }
						th { background: rgba(0,0,0,0.3); padding: 15px 20px; font-size: 0.8rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
						td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: 600; }
						tr:last-child td { border-bottom: none; }
						tr:hover { background: rgba(255,255,255,0.02); }

						@media (max-width: 800px) {
						main { margin-left: 0; padding: 1rem; padding-bottom: 80px; }
						.sidebar { width: 100%; height: 70px; top: auto; bottom: 0; flex-direction: row; justify-content: space-around; padding: 10px; z-index: 100; border-right: none; border-top: 1px solid var(--border); }
						.sidebar .logo, .sidebar .logout, .nav-text { display: none; }
						.podium-container { gap: 5px; }
						.podium-item { width: 32%; padding: 1rem 0.5rem; }
						.podium-avatar { width: 50px; height: 50px; top: -25px; }
						.place-1 .podium-avatar { width: 60px; height: 60px; top: -30px; }
						.podium-name { font-size: 0.85rem; margin-top: 20px; }
						.podium-xp { font-size: 0.9rem; }
						td, th { padding: 10px 15px; font-size: 0.9rem; }
						.hide-mobile { display: none; }
						}
					</style>
				</head>
	<body>
		<nav class="sidebar">
			<a href="profile.html" class="logo">
				<img src="logo-felix.png" onerror="this.style.display='none'"> FEL-X
			</a>
			<a href="profile.html" class="nav-link">
				👤 <span class="nav-text">Profil</span>
			</a>
			<a href="leaderboard.html" class="nav-link active">
				🏆 <span class="nav-text">Classement</span>
			</a>
			<a href="stats.html" class="nav-link">
				📊 <span class="nav-text">Statistiques</span>
			</a>
			<a href="felix.html" class="nav-link">
				🧠 <span class="nav-text">Félix et moi</span>
			</a>
			<a href="#" id="logout-btn" class="nav-link logout">
				🚪 <span class="nav-text">Déconnexion</span>
			</a>
		</nav>

		<main>
			<div id="loading-overlay">
				<div class="spinner"></div>
				<h2 style="margin:0;">Génération du classement...</h2>
				<p style="color: var(--text-dim);">Interrogation de la base de données...</p>
			</div>

			<h1 style="font-size: 2.5rem; font-weight: 800; margin-top: 0; text-align: center;">🏆 Mur des Légendes</h1>
			<p style="text-align: center; color: var(--text-dim); margin-bottom: 2rem;">Les viewers les plus actifs et fidèles de la chaîne.</p>

			<div class="podium-container" id="podium-container"></div>

			<div class="table-container">
				<table>
					<thead>
						<tr>
							<th style="width: 60px; text-align: center;">#</th>
							<th>Viewer</th>
							<th class="hide-mobile">Niveau</th>
							<th style="text-align: right;">EXP Total</th>
						</tr>
					</thead>
					<tbody id="leaderboard-list"></tbody>
				</table>
			</div>
		</main>

		<script src="config.js"></script>
		<script src="app.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", async () => {
			const token = checkAuth();
			if (!token) return;

			const loadingEl = document.getElementById("loading-overlay");
			const listEl = document.getElementById("leaderboard-list");
			const podiumEl = document.getElementById("podium-container");

			const API_URL = typeof CONFIG !== 'undefined' ? CONFIG.API_BASE_URL : "";
			const CLIENT_ID = typeof CONFIG !== 'undefined' ? CONFIG.CLIENT_ID : "";

			try {
			// 💡 L'AJOUT MAGIQUE EST ICI (ngrok-skip-browser-warning)
			const response = await fetch(`${API_URL}/leaderboard`, {
			headers: {
			"Accept": "application/json",
			"ngrok-skip-browser-warning": "true"
			}
			});

			if (!response.ok) throw new Error(`Erreur serveur: ${response.status}`);

			const rawData = await response.json();
			if (!rawData || rawData.length === 0) {
			loadingEl.innerHTML = `<h2>Classement vide</h2>`;
			return;
			}

			const usersArray = rawData.filter(u => {
			const n = u.username.toLowerCase();
			return n !== "masthom_" && n !== "felixthebigblackcat" && n !== "streamelements" && n !== "wizebot" && n !== "nightbot";
			}).sort((a, b) => (b.points || 0) - (a.points || 0));

			const top3 = usersArray.slice(0, 3);
			const rest = usersArray.slice(3, 50);

			let twitchUsers = [];
			if (top3.length > 0) {
			try {
			const validLogins = top3.map(u => u.username.toLowerCase().replace(/[^a-z0-9_]/g, ''));
			const loginsQuery = validLogins.map(login => `login=${login}`).join('&');

			const resp = await fetch(`https://api.twitch.tv/helix/users?${loginsQuery}`, {
			headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CLIENT_ID }
			});
			const data = await resp.json();
			twitchUsers = data.data || [];
			} catch (e) { console.error("Erreur Twitch Avatars:", e); }
			}

			let podiumItems = [];
			top3.forEach((user, index) => {
			const rank = index + 1;
			const tUser = twitchUsers.find(u => u.login.toLowerCase() === user.username.toLowerCase());
			const avatar = tUser ? tUser.profile_image_url : "logo-felix.png";
			const level = user.level || calculateLevel(user.points);

			podiumItems[rank - 1] = `
			<div class="podium-item place-${rank}">
				<img src="${avatar}" class="podium-avatar" onerror="this.src='logo-felix.png'">
					<div class="podium-name">${user.username}</div>
					<div class="podium-xp">${(user.points || 0).toLocaleString('fr-FR')} XP</div>
					<div style="font-size:0.75rem; color:var(--text-dim); margin-top:5px; font-weight:600;">Niveau ${level}</div>
					<div class="podium-rank">${rank}</div>
				</div>`;
			});

			let podiumHTML = "";
			if(podiumItems[1]) podiumHTML += podiumItems[1];
			if(podiumItems[0]) podiumHTML += podiumItems[0];
			if(podiumItems[2]) podiumHTML += podiumItems[2];
			podiumEl.innerHTML = podiumHTML;

			listEl.innerHTML = "";
			rest.forEach((user, index) => {
			const rank = index + 4;
			const level = user.level || calculateLevel(user.points);

			const tr = document.createElement("tr");
			tr.innerHTML = `
			<td style="text-align: center; color: var(--text-dim); font-weight: 800;">${rank}</td>
			<td style="font-weight: 800;">${user.username}</td>
			<td class="hide-mobile">
				<span style="background:var(--surface); border: 1px solid var(--border); padding:4px 10px; border-radius:8px; font-size:0.8em; color: var(--text-dim);">Lvl ${level}</span>
			</td>
			<td style="text-align:right;">
				<div style="color:var(--accent); font-weight:900; font-family: monospace; font-size: 1.1rem;">${(user.points || 0).toLocaleString('fr-FR')}</div>
			</td>`;
			listEl.appendChild(tr);
			});

			loadingEl.style.display = "none";

			} catch (error) {
			console.error(error);
			loadingEl.innerHTML = `<h2 style="color:#f43f5e;">Erreur de connexion</h2><p>Impossible de lire les données du bot.</p>`;
			}
			});
		</script>
	</body>
</html>
