<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>Mur des Légendes - FEL-X</title>
				<!-- Les styles globaux sont injectés par sidebar.js -->
				<style>
					@keyframes fadeUp {
					from { opacity: 0; transform: translateY(20px); }
					to { opacity: 1; transform: translateY(0); }
					}

					.podium-container {
					display: flex;
					justify-content: center;
					align-items: flex-end;
					gap: 2rem;
					margin: 4rem 0;
					perspective: 1000px;
					}

					.podium-item {
					flex: 1;
					max-width: 250px;
					animation: fadeUp 0.8s ease forwards;
					opacity: 0;
					}

					.podium-card {
					background: var(--surface);
					backdrop-filter: blur(12px);
					border: 1px solid var(--border);
					border-radius: 24px;
					padding: 2rem 1.5rem;
					text-align: center;
					position: relative;
					transition: transform 0.3s ease;
					}

					.podium-card:hover {
					transform: translateY(-10px);
					border-color: var(--accent);
					}

					.podium-avatar {
					width: 80px;
					height: 80px;
					border-radius: 50%;
					margin: -60px auto 15px auto;
					border: 4px solid var(--surface);
					box-shadow: 0 10px 25px rgba(0,0,0,0.5);
					background: #0f172a;
					object-fit: cover;
					}

					/* Spécificités pour le n°1 */
					.place-1 { order: 2; transform: scale(1.1); z-index: 10; }
					.place-1 .podium-card { border-color: rgba(251, 191, 36, 0.3); background: linear-gradient(180deg, rgba(251, 191, 36, 0.05) 0%, var(--surface) 100%); }
					.place-1 .podium-avatar { width: 100px; height: 100px; border-color: #fbbf24; }
					.place-1 .rank-tag { background: #fbbf24; color: #000; }

					.place-2 { order: 1; }
					.place-2 .rank-tag { background: #94a3b8; color: #000; }

					.place-3 { order: 3; }
					.place-3 .rank-tag { background: #b45309; color: #fff; }

					.rank-tag {
					position: absolute;
					top: 15px;
					right: 15px;
					font-size: 0.7rem;
					font-weight: 900;
					padding: 4px 10px;
					border-radius: 8px;
					text-transform: uppercase;
					}

					.leader-name { font-weight: 800; font-size: 1.2rem; color: #fff; margin-bottom: 5px; }
					.leader-xp { font-weight: 700; color: var(--accent); font-size: 0.9rem; }

					@media (max-width: 800px) {
					.podium-container { flex-direction: column; align-items: center; gap: 4rem; margin-top: 5rem; }
					.podium-item { width: 100%; max-width: 300px; }
					.place-1 { order: 1; transform: scale(1); }
					.place-2 { order: 2; }
					.place-3 { order: 3; }
					}
				</style>
			</head>
	<body>
		<main>
			<header style="text-align: center; margin-bottom: 3rem;">
				<h1>Classement</h1>
				<p class="page-desc">Découvrez les viewers les plus engagés de la communauté.</p>
			</header>

			<!-- Podium du Top 3 -->
			<div id="podium" class="podium-container">
				<!-- Injecté par JS -->
			</div>

			<!-- Reste du classement -->
			<div class="card" style="padding: 0; overflow: hidden;">
				<table style="margin-top: 0; width: 100%;">
					<thead>
						<tr>
							<th style="width: 80px; text-align: center;">Rang</th>
							<th>Viewer</th>
							<th style="width: 150px;">Niveau</th>
							<th style="text-align: right; padding-right: 2rem;">Expérience Total</th>
						</tr>
					</thead>
					<tbody id="leader-list">
						<!-- Injecté par JS -->
					</tbody>
				</table>
			</div>
		</main>

		<script src="config.js"></script>
		<script src="app.js"></script>
		<script src="sidebar.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", async () => {
			const token = checkAuth();
			if(!token) return;

			try {
			// 1. Récupération des données du Bot
			const resp = await fetch(`${CONFIG.API_BASE_URL}/leaderboard`, {
			headers: { "ngrok-skip-browser-warning": "true" }
			});

			if (!resp.ok) throw new Error("Erreur de récupération");

			const rawData = await resp.json();

			// Filtrage des bots et de Masthom
			const users = rawData.filter(u => {
			const n = u.username.toLowerCase();
			return !["masthom_", "streamelements", "felixthebigblackcat", "wizebot", "nightbot"].includes(n);
			});

			const top3 = users.slice(0, 3);
			const rest = users.slice(3, 50);

			// 2. Récupération des avatars Twitch pour le Top 3
			let avatars = {};
			try {
			const logins = top3.map(u => `login=${u.username.toLowerCase()}`).join('&');
			const tResp = await fetch(`https://api.twitch.tv/helix/users?${logins}`, {
			headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CONFIG.CLIENT_ID }
			});
			const tData = await tResp.json();
			tData.data.forEach(user => {
			avatars[user.login.toLowerCase()] = user.profile_image_url;
			});
			} catch (e) { console.warn("Avatars Twitch inaccessibles"); }

			// 3. Rendu du Podium
			const podiumEl = document.getElementById("podium");
			podiumEl.innerHTML = "";

			top3.forEach((u, i) => {
			const rank = i + 1;
			const avatar = avatars[u.username.toLowerCase()] || "logo-felix.png";
			const div = document.createElement("div");
			div.className = `podium-item place-${rank}`;
			div.style.animationDelay = `${i * 0.2}s`;

			div.innerHTML = `
			<div class="podium-card">
				<div class="rank-tag">#${rank}</div>
				<img src="${avatar}" class="podium-avatar" onerror="this.src='logo-felix.png'">
					<div class="leader-name">${u.username}</div>
					<div class="leader-xp">${u.points.toLocaleString('fr-FR')} XP</div>
					<div style="font-size: 0.7rem; color: var(--text-dim); margin-top:10px; font-weight:700; text-transform:uppercase;">Niveau ${calculateLevel(u.points)}</div>
				</div>
			`;
			podiumEl.appendChild(div);
			});

			// 4. Rendu de la liste (Tableau)
			const list = document.getElementById("leader-list");
			list.innerHTML = "";

			if (rest.length === 0 && top3.length === 0) {
			list.innerHTML = `<tr>
				<td colspan="4" style="text-align:center; padding:4rem; color:var(--text-dim);">Le classement est encore vide...</td>
			</tr>`;
			}

			rest.forEach((u, i) => {
			const tr = document.createElement("tr");
			tr.style.animation = `fadeUp 0.5s ease forwards ${0.5 + (i * 0.05)}s`;
			tr.style.opacity = "0";

			tr.innerHTML = `
			<td style="text-align:center; font-weight:800; color:var(--text-dim); font-family: monospace; font-size: 1.1rem;">${i+4}</td>
			<td style="font-weight:700; color:#fff;">${u.username}</td>
			<td>
				<span style="background: rgba(139, 92, 246, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 10px; font-size: 0.8rem; font-weight: 800; border: 1px solid rgba(139, 92, 246, 0.2);">
					Lvl ${calculateLevel(u.points)}
				</span>
			</td>
			<td style="text-align:right; padding-right: 2rem; font-weight:900; color:var(--accent); font-family: 'JetBrains Mono', monospace;">
				${u.points.toLocaleString('fr-FR')}
			</td>
			`;
			list.appendChild(tr);
			});

			} catch (e) {
			console.error(e);
			document.getElementById("podium").innerHTML = `<p style="color:var(--danger); font-weight:700;">Impossible de charger le classement. Vérifie la connexion au bot.</p>`;
			}
			});
		</script>
	</body>
</html>
