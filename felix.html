<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
				<title>Félix et moi - FEL-X</title>
				<!-- Référence au design maître -->
				<link rel="stylesheet" href="style.css">
					<style>
						/* Styles spécifiques au formulaire */
						.form-section-title {
						font-size: 0.8rem;
						font-weight: 800;
						text-transform: uppercase;
						color: var(--accent);
						letter-spacing: 2px;
						margin-bottom: 1.5rem;
						display: flex;
						align-items: center;
						gap: 10px;
						}

						.input-group {
						margin-bottom: 1.5rem;
						}

						.input-group label {
						display: block;
						font-size: 0.75rem;
						font-weight: 700;
						color: var(--text-dim);
						margin-bottom: 8px;
						text-transform: uppercase;
						letter-spacing: 0.5px;
						}

						input[type="text"],
						input[type="number"],
						select,
						textarea {
						width: 100%;
						padding: 14px 18px;
						background: rgba(0, 0, 0, 0.3);
						border: 1px solid var(--border);
						border-radius: 16px;
						color: #fff;
						font-family: inherit;
						font-size: 1rem;
						transition: all 0.2s ease;
						}

						input:focus, textarea:focus, select:focus {
						outline: none;
						border-color: var(--accent);
						background: rgba(0, 245, 195, 0.03);
						box-shadow: 0 0 15px var(--accent-glow);
						}

						.btn-submit {
						width: 100%;
						padding: 1.25rem;
						background: var(--accent);
						color: #0b0f1a;
						border: none;
						border-radius: 18px;
						font-weight: 900;
						font-size: 1.1rem;
						text-transform: uppercase;
						letter-spacing: 1px;
						cursor: pointer;
						transition: all 0.3s ease;
						margin-top: 1rem;
						box-shadow: 0 10px 25px -5px var(--accent-glow);
						}

						.btn-submit:hover {
						transform: translateY(-3px);
						background: #fff;
						box-shadow: 0 15px 30px -5px rgba(255,255,255,0.2);
						}

						.btn-submit:active {
						transform: translateY(0);
						}

						#save-status {
						position: fixed;
						bottom: 30px;
						right: 30px;
						padding: 15px 25px;
						border-radius: 15px;
						background: var(--accent);
						color: #000;
						font-weight: 800;
						display: none;
						z-index: 3000;
						box-shadow: 0 10px 30px rgba(0,0,0,0.5);
						animation: slideIn 0.5s ease;
						}

						@keyframes slideIn {
						from { transform: translateX(100%); opacity: 0; }
						to { transform: translateX(0); opacity: 1; }
						}
					</style>
				</head>
	<body>
		<!-- La sidebar est injectée ici par sidebar.js -->

		<main>
			<header>
				<h1>Félix et moi</h1>
				<p class="page-desc">Configurez votre identité secrète pour que Félix vous reconnaisse en live.</p>
			</header>

			<form id="felix-form" style="max-width: 900px;">
				<!-- Section 1 : Identité -->
				<div class="card">
					<div class="form-section-title">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
							<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
							<circle cx="12" cy="7" r="4"></circle>
						</svg>
						1. Votre Identité & Humeur
					</div>
					<div class="grid" style="grid-template-columns: 1fr 1fr;">
						<div class="input-group">
							<label>Surnom Souhaité</label>
							<input type="text" id="nickname" placeholder="Alex, Le Boss, Féfé...">
                    </div>
						<div class="input-group">
							<label>Votre Vibe (Ambiance)</label>
							<input type="text" id="vibe" placeholder="Chill, Taquin, Tryharder...">
                    </div>
						<div class="input-group">
							<label>Date d'anniversaire</label>
							<input type="text" id="birthday" placeholder="12 Mai">
                    </div>
						<div class="input-group">
							<label>Niveau de Roast (1 à 10)</label>
							<input type="number" id="roast_level" min="1" max="10" value="5">
                    </div>
					</div>
				</div>

				<!-- Section 2 : Goûts -->
				<div class="card">
					<div class="form-section-title">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
							<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
						</svg>
						2. Gaming & Préférences
					</div>
					<div class="grid" style="grid-template-columns: 1fr 1fr;">
						<div class="input-group">
							<label>Jeu de coeur</label>
							<input type="text" id="favorite_game" placeholder="Minecraft, LoL, Elden Ring...">
                    </div>
						<div class="input-group">
							<label>Snack / Boisson favorite</label>
							<input type="text" id="favorite_food" placeholder="Pizza, Café, Monster...">
                    </div>
						<div class="input-group" style="grid-column: 1 / -1;">
							<label>Note pour Félix (Ce qu'il doit ne jamais oublier)</label>
							<textarea id="free_message" rows="4" placeholder="Félix, n'oublie jamais que je suis le roi du skill sur..."></textarea>
						</div>
					</div>
				</div>

				<button type="submit" class="btn-submit">Mémoriser mon profil dans l'IA ✨</button>
			</form>

			<div id="save-status">✨ Profil synchronisé avec succès !</div>
		</main>

		<script src="config.js"></script>
		<script src="app.js"></script>
		<script src="sidebar.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", async () => {
			const token = checkAuth();
			if(!token) return;

			const API_URL = CONFIG.API_BASE_URL;
			const CLIENT_ID = CONFIG.CLIENT_ID;

			// 1. Récupération ID Twitch
			const uResp = await fetch('https://api.twitch.tv/helix/users', {
			headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CLIENT_ID }
			});
			const uData = await uResp.json();
			const twitchId = uData.data[0].id;

			// 2. Chargement des données actuelles
			const bResp = await fetch(`${API_URL}/viewer/${twitchId}`, {
			headers: { "ngrok-skip-browser-warning": "true" }
			});

			if(bResp.ok) {
			const d = await bResp.json();
			const fields = ["nickname", "vibe", "birthday", "roast_level", "favorite_game", "favorite_food", "free_message"];
			fields.forEach(f => {
			if(d[f] || d[f] === 0) document.getElementById(f).value = d[f];
			});
			}

			// 3. Sauvegarde
			document.getElementById("felix-form").onsubmit = async (e) => {
			e.preventDefault();
			const btn = e.target.querySelector('button');
			btn.textContent = "SYNCHRONISATION...";
			btn.style.opacity = "0.7";

			const payload = {
			twitch_id: twitchId,
			nickname: document.getElementById("nickname").value,
			vibe: document.getElementById("vibe").value,
			birthday: document.getElementById("birthday").value,
			roast_level: parseInt(document.getElementById("roast_level").value) || 5,
			favorite_game: document.getElementById("favorite_game").value,
			favorite_food: document.getElementById("favorite_food").value,
			free_message: document.getElementById("free_message").value
			};

			try {
			const res = await fetch(`${API_URL}/viewer/update_context`, {
			method: "POST",
			headers: {
			"Content-Type": "application/json",
			"ngrok-skip-browser-warning": "true"
			},
			body: JSON.stringify(payload)
			});

			if(res.ok) {
			const status = document.getElementById("save-status");
			status.style.display = "block";
			setTimeout(() => { status.style.display = "none"; }, 4000);
			}
			} catch (err) {
			alert("Erreur de connexion au Bot.");
			} finally {
			btn.textContent = "MÉMORISER MON PROFIL DANS L'IA ✨";
			btn.style.opacity = "1";
			}
			};
			});
		</script>
	</body>
</html>
