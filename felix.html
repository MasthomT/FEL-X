<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Félix et moi - FEL-X</title>
		<link rel="stylesheet" href="style.css" />
		<style>
			:root {
			--bg: #18181b; --card: #2c2f33; --border: #3f3f46;
			--text: #f4f4f5; --text-dim: #a1a1aa; --accent: #00f5c3;
			}
			.section-title { color: var(--accent); font-size: 1.1rem; margin: 2rem 0 1rem 0; text-transform: uppercase; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; display: flex; align-items: center; gap: 10px; }
			.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
			.form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem; font-weight: 500; }
			input, select, textarea {
			width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border);
			color: white; border-radius: 8px; font-size: 1rem; font-family: inherit; transition: 0.2s;
			}
			input:focus, textarea:focus, select:focus { border-color: var(--accent); outline: none; background: #202024; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2); }

			/* Style pour le slider de taquinerie */
			.range-container { display: flex; align-items: center; gap: 15px; background: var(--bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
			input[type="range"] { accent-color: var(--accent); cursor: pointer; }
			.range-value { font-weight: bold; color: var(--accent); min-width: 25px; }

			.form-full { grid-column: 1 / -1; }
			.btn-save {
			background: var(--accent); color: white; border: none; padding: 16px 24px;
			font-weight: 800; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 2rem; font-size: 1.1rem;
			text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
			}
			.btn-save:hover { background: #7c3aed; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
			#loading { text-align:center; padding:5rem; font-size: 1.2rem; color: var(--accent); font-weight: 600; }
			@media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
		</style>
	</head>
	<body>
		<nav class="sidebar">
			<a href="profile.html" class="logo">
				<img src="logo-felix.png">
					<span>FEL-X</span>
			</a>
			<a href="profile.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
				</svg> Profil
			</a>
			<a href="infos.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
				</svg> Infos
			</a>
			<a href="leaderboard.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M16 11V3H8v8H2v10h20V11h-6zm-6-6h4v14h-4V5zm-6 6h4v8H4v-8zm16 8h-4v-8h4v8z"/>
				</svg> Classement
			</a>
			<a href="clips.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
				</svg> Clips
			</a>
			<a href="commands.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
				</svg> Commandes
			</a>
			<a href="stats.html" class="nav-link">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.03 0-4.43-.82-6.14-2.88a9.947 9.947 0 0 1 12.28 0C16.43 19.18 14.03 20 12 20z"/>
				</svg> Stats
			</a>
			<a href="felix.html" class="nav-link active">
				<svg viewBox="0 0 24 24" fill="currentColor">
					<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
				</svg> Félix et moi
			</a>
			<a href="#" id="logout-btn" class="nav-link logout">Déconnexion</a>
		</nav>

		<main>
			<div style="max-width: 800px; margin: 0 auto; padding-bottom: 4rem;">
				<h1>🧠 Félix et moi</h1>
				<p style="color: var(--text-dim); margin-bottom: 2rem;">Personnalise ton expérience : plus j'en sais, plus je serai précis avec toi !</p>

				<div id="loading">Chargement de ton profil psychologique...</div>

				<form id="felixForm" style="display:none;">
					<div class="section-title">👤 1. Identité & Rythme</div>
					<div class="card">
						<div class="form-grid">
							<div class="form-group">
								<label>Surnom pour toi</label>
								<input type="text" id="nickname" placeholder="Comment dois-je t'appeler ?">
                            </div>
							<div class="form-group">
								<label>Ton surnom pour MOI (Félix)</label>
								<input type="text" id="felix_nickname" placeholder="Ex: Le Chat, Chef...">
                            </div>
							<div class="form-group">
								<label>Anniversaire 🎂</label>
								<input type="date" id="birthday">
                            </div>
							<div class="form-group">
								<label>Rythme de vie</label>
								<select id="sleep_pattern">
									<option value="none">Non précisé</option>
									<option value="night_owl">Oiseau de nuit (Couche-tard)</option>
									<option value="early_bird">Lève-tôt (Matin) </option>
								</select>
							</div>
							<div class="form-group">
								<label>Pronoms</label>
								<select id="pronouns">
									<option value="">Peu importe</option>
									<option value="il">Il / Lui</option>
									<option value="elle">Elle</option>
									<option value="iel">Iel</option>
								</select>
							</div>
							<div class="form-group">
								<label>Ta Vibe générale</label>
								<input type="text" id="vibe" placeholder="Ex: Chill, Tryharder, Observateur...">
                            </div>
						</div>
					</div>

					<div class="section-title">🎮 2. Gaming & Stream</div>
					<div class="card">
						<div class="form-grid">
							<div class="form-group">
								<label>Jeu Favori ❤️</label>
								<input type="text" id="favorite_game" placeholder="Le jeu de ton coeur">
                            </div>
							<div class="form-group">
								<label>Ton jeu "Doudou"</label>
								<input type="text" id="comfort_game" placeholder="Celui où tu reviens toujours">
                            </div>
							<div class="form-group">
								<label>Emote signature</label>
								<input type="text" id="signature_emote" placeholder="Celle qui te définit">
                            </div>
							<div class="form-group">
								<label>Style de jeu</label>
								<select id="play_style">
									<option value="chill">Détente / Fun</option>
									<option value="tryhard">Tryhard / Compétitif</option>
								</select>
							</div>
							<div class="form-group form-full">
								<label>Talent inutile ou Passion ?</label>
								<input type="text" id="useless_talent" placeholder="Savoir faire le cri de la chèvre, dessin, astro...">
                            </div>
						</div>
					</div>

					<div class="section-title">🎭 3. Relation & Goûts</div>
					<div class="card">
						<div class="form-grid">
							<div class="form-group">
								<label>Niveau de Taquinerie souhaité (1-10)</label>
								<div class="range-container">
									<input type="range" id="roast_level" min="1" max="10" value="5" oninput="this.nextElementSibling.innerText = this.value">
										<span class="range-value">5</span>
									</div>
							</div>
							<div class="form-group">
								<label>Ta fonction préférée chez moi</label>
								<select id="favorite_feature">
									<option value="ia_chat">Discuter avec moi</option>
									<option value="xp_system">L'XP et les niveaux</option>
									<option value="commands">Les commandes fun</option>
									<option value="clips">Voir les clips</option>
								</select>
							</div>
							<div class="form-group">
								<label>Plat / Snack 🍕</label>
								<input type="text" id="favorite_food" placeholder="Pour les soirées stream">
                            </div>
							<div class="form-group">
								<label>Boisson 🥤</label>
								<input type="text" id="favorite_drink" placeholder="Café ? Eau ? Soda ?">
                            </div>
						</div>
					</div>

					<div class="section-title">📝 4. Zone Libre</div>
					<div class="card">
						<div class="form-group">
							<label>Un message ou une anecdote pour Félix ?</label>
							<textarea id="free_message" rows="4" placeholder="C'est ici que tu peux me raconter ta vie..."></textarea>
						</div>
					</div>

					<button type="submit" id="saveBtn" class="btn-save">Mémoriser mon profil ✨</button>
				</form>
			</div>
		</main>

		<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
		<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
		<script src="config.js"></script>
		<script src="app.js"></script>
		<script>
			// Mise à jour de la liste exhaustive des champs
			const fields = [
			'nickname', 'felix_nickname', 'birthday', 'sleep_pattern', 'pronouns', 'vibe',
			'favorite_game', 'comfort_game', 'signature_emote', 'play_style', 'useless_talent',
			'favorite_food', 'favorite_drink', 'roast_level', 'favorite_feature', 'free_message'
			];

			async function getUserId(token) {
			try {
			const r = await fetch('https://api.twitch.tv/helix/users', {
			headers: { 'Authorization': 'Bearer ' + token, 'Client-Id': CONFIG.CLIENT_ID }
			});
			const d = await r.json();
			return d.data && d.data.length > 0 ? d.data[0].id : null;
			} catch (e) { return null; }
			}

			document.addEventListener('DOMContentLoaded', async () => {
			const database = firebase.database();
			const token = checkAuth();
			if(!token) return;

			const userId = await getUserId(token);
			const loadingEl = document.getElementById('loading');
			const formEl = document.getElementById('felixForm');

			if (userId) {
			// --- 🔄 SYNCHRONISATION (CLOUD -> UI) ---
			database.ref('viewer_data/ai_context/' + userId).on('value', (snapshot) => {
			const data = snapshot.val();
			if (data) {
			fields.forEach(f => {
			const input = document.getElementById(f);
			if (input && document.activeElement !== input) {
			input.value = data[f] || (f === 'roast_level' ? 5 : "");
			// Mise à jour visuelle du badge du slider
			if(f === 'roast_level') input.nextElementSibling.innerText = input.value;
			}
			});
			}
			loadingEl.style.display = 'none';
			formEl.style.display = 'block';
			});

			// --- 💾 SAUVEGARDE (UI -> CLOUD & PI) ---
			formEl.addEventListener('submit', async (e) => {
			e.preventDefault();
			const btn = document.getElementById('saveBtn');
			btn.textContent = "⌛ Synchronisation en cours...";
			btn.disabled = true;

			const payload = {
			twitch_id: userId,
			username: localStorage.getItem('twitch_username') || "inconnu"
			};

			fields.forEach(f => {
			const el = document.getElementById(f);
			if (el) payload[f] = el.value;
			});

			try {
			// 1. Mise à jour Firebase
			await database.ref('viewer_data/ai_context/' + userId).update({
			...payload,
			last_updated: new Date().toISOString()
			});

			// 2. Notification au Raspberry Pi (Bot local)
			await fetch(CONFIG.SERVER_URL + '/api/update_context', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
			body: JSON.stringify(payload)
			});

			alert("✨ Miaou ! J'ai bien noté tout ça dans mon carnet.");
			} catch (err) {
			console.error("Erreur de synchro:", err);
			alert("✅ Sauvegardé dans le Cloud (Le serveur local est peut-être en pause).");
			} finally {
			btn.textContent = "Mémoriser mon profil ✨";
			btn.disabled = false;
			}
			});
			}
			});
		</script>
	</body>
</html>
