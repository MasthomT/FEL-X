<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infos - FEL-X</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- Grille Principale --- */
        .info-grid { display: grid; grid-template-columns: 300px 1fr; gap: 2.5rem; align-items: start; }
        .sticky-col { position: sticky; top: 2rem; }

        /* --- Titres de Section --- */
        .section-title {
            font-size: 0.85rem; font-weight: 800; text-transform: uppercase;
            color: var(--accent); letter-spacing: 2px;
            margin: 0 0 1.5rem 0.5rem;
            display: flex; align-items: center; gap: 12px;
        }

        /* --- Boutons Réseaux --- */
        .social-links { display: flex; flex-direction: column; gap: 12px; }
        .social-btn {
            display: flex; align-items: center; gap: 15px; padding: 16px;
            border-radius: 16px; text-decoration: none; font-weight: 800; color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border);
        }
        .social-btn:hover { transform: translateX(8px); color: white; border-color: transparent; }
        .social-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .discord:hover { background: #5865F2; box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3); }
        .youtube:hover { background: #FF0000; box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3); }
        .twitch:hover { background: #9146FF; box-shadow: 0 10px 20px rgba(145, 70, 255, 0.3); }
        .tiktok:hover { background: #000000; border-color: #fe2c55; box-shadow: 0 10px 20px rgba(254, 44, 85, 0.3); }
        .tips:hover { background: var(--accent); color: #0b0f1a; box-shadow: 0 10px 20px var(--accent-glow); }

        /* --- Planning --- */
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
        .day-card {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            border-radius: 18px; padding: 1.5rem 1rem; text-align: center;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .day-card:hover { border-color: rgba(255,255,255,0.2); }
        .next-stream { border-color: var(--accent) !important; box-shadow: 0 0 25px var(--accent-glow); background: rgba(0, 245, 195, 0.05) !important; }
        .day-name { font-size: 0.8rem; font-weight: 800; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; }
        .day-time { font-size: 1.8rem; font-weight: 900; color: #fff; line-height: 1; }
        .day-event { font-size: 0.75rem; color: var(--accent); margin-top: 10px; font-weight: 700; text-transform: uppercase; }

        /* --- Règles --- */
        ul.simple-rules { list-style: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; padding: 0; }
        ul.simple-rules li {
            background: rgba(0,0,0,0.2); padding: 16px 20px; border-radius: 16px;
            font-size: 0.95rem; display: flex; align-items: center; gap: 15px;
            border: 1px solid var(--border); transition: 0.3s; font-weight: 500;
        }
        ul.simple-rules li:hover { background: rgba(0, 245, 195, 0.03); border-color: var(--accent); box-shadow: 0 5px 20px var(--accent-glow); }
        .emoji { font-size: 1.4rem; }

        @media (max-width: 900px) { .info-grid { grid-template-columns: 1fr; gap: 2rem; } .sticky-col { position: relative; top: 0; } ul.simple-rules { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <main id="main-content">
        <header>
            <h1>Informations du Stream</h1>
            <p class="page-desc">Tout ce qu'il faut savoir sur la chaîne, le planning et nos réseaux.</p>
        </header>

        <div class="info-grid">
            <div class="sticky-col">

                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                    </svg> Rejoins la commu
                </h2>
                <div class="card" style="padding: 1.5rem;">

                        </a>

                        </a>
                    </div>
                </div>
            </div>

            <div>
                <h2 class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg> À propos du stream
                </h2>
                <div class="card">
                    <div id="about-container" style="color: var(--text-main); line-height: 1.7; font-size: 1.05rem;">
                        Chargement des informations...
                    </div>
                </div>

                <h2 class="section-title" style="margin-top: 3.5rem;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> Planning de Diffusion
                </h2>
                <div class="card">
                    <div class="calendar-grid" id="schedule-container">
                        </div>
                </div>

                <h2 class="section-title" style="margin-top: 3.5rem;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg> Règles de la Communauté
                </h2>
                <div class="card">
                    <ul class="simple-rules" id="rules-container">
                        </ul>
                </div>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="sidebar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            if (typeof checkAuth === 'function') checkAuth();
            await loadPublicChannelInfo();
        });

        async function loadPublicChannelInfo() {
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/channel-info`, {
                    headers: { "Cache-Control": "no-cache" }
                });
                const data = await res.json();

                if (!data.error) {
                    // 1. Textes à propos
                    // On remplace les retours à la ligne par des balises <br> pour un bel affichage
                    const formattedText = data.about_text ? data.about_text.replace(/\n/g, '<br>') : "Bienvenue !";
                    document.getElementById('about-container').innerHTML = `<p>${formattedText}</p>`;

                    // 2. Réseaux sociaux
                    const socials = ['discord', 'youtube', 'twitch', 'tiktok', 'tips'];
                    socials.forEach(s => {
                        const linkEl = document.getElementById(`link-${s}`);
                        if (data[`social_${s}`]) {
                            linkEl.href = data[`social_${s}`];
                            linkEl.style.display = 'flex'; // Affiche le bouton
                        } else {
                            linkEl.style.display = 'none'; // Cache le bouton s'il est vide dans l'admin
                        }
                    });

                    // 3. Planning
                    const scheduleContainer = document.getElementById('schedule-container');
                    scheduleContainer.innerHTML = '';
                    if (data.schedule && data.schedule.length > 0) {
                        data.schedule.forEach(s => {
                            scheduleContainer.innerHTML += `
                                <div class="day-card" id="day-${s.day_index}">
                                    <div class="day-name">${s.day_name}</div>
                                    <div class="day-time">${s.time}</div>
                                    <div class="day-event">${s.event}</div>
                                </div>
                            `;
                        });
                        highlightNextStream(data.schedule);
                    } else {
                        scheduleContainer.innerHTML = '<p style="color:var(--text-dim); text-align:center; width:100%;">Aucun stream prévu pour le moment.</p>';
                    }

                    // 4. Règles
                    const rulesContainer = document.getElementById('rules-container');
                    rulesContainer.innerHTML = '';
                    if (data.rules && data.rules.length > 0) {
                        data.rules.forEach(r => {
                            // Si is_danger est coché, on met le texte en gras et en rouge
                            const dangerStyle = r.is_danger ? 'color: var(--danger); font-weight: bold;' : 'color: #fff;';
                            rulesContainer.innerHTML += `
                                <li>
                                    <span class="emoji">${r.emoji}</span>
                                    <span style="${dangerStyle}">${r.text}</span>
                                </li>
                            `;
                        });
                    }
                }
            } catch (e) {
                console.error("Erreur de chargement des infos de la chaîne", e);
                document.getElementById('about-container').innerHTML = `<p style="color:var(--danger)">Impossible de charger les données du bot.</p>`;
            }
        }

        function highlightNextStream(scheduleData) {
            if (!scheduleData || scheduleData.length === 0) return;

            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();

            // On extrait grossièrement l'heure du texte (ex: "18h00" devient 18) pour la logique
            const parsedSchedule = scheduleData.map(s => {
                const match = s.time.match(/(\d+)/);
                const streamHour = match ? parseInt(match[1]) : 18;
                return { d: parseInt(s.day_index), h: streamHour, id: `day-${s.day_index}` };
            });

            // On trie par jour puis par heure
            parsedSchedule.sort((a, b) => a.d - b.d || a.h - b.h);

            // On cherche le premier live qui est dans le futur cette semaine, sinon on boucle sur le premier
            let next = parsedSchedule.find(s => s.d > day || (s.d === day && s.h > hour)) || parsedSchedule[0];

            if (next) {
                const card = document.getElementById(next.id);
                if (card) {
                    card.classList.add("next-stream");
                    const badge = document.createElement("div");
                    badge.style.cssText = "position:absolute; top:0; right:0; background:var(--accent); color:#0b0f1a; font-size:0.65rem; padding:6px 14px; font-weight:900; border-bottom-left-radius:16px; letter-spacing: 1px;";
                    badge.textContent = "PROCHAIN";
                    card.appendChild(badge);
                }
            }
        }
    </script>
</body>
</html>
