<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>Stats - FEL-X</title>
				<link rel="stylesheet" href="style.css">
</head>
	<body>
		<main>
			<h1>📊 Statistiques Globales</h1>

			<div class="card" style="margin-bottom:2rem; border-left: 4px solid var(--accent);">
				<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
					<span style="font-weight:bold;">Objectif 1500 Followers</span>
					<span id="cur-f">0</span>
				</div>
				<div style="width:100%; height:12px; background:var(--bg); border-radius:6px; overflow:hidden;">
					<div id="f-bar" style="height:100%; background:var(--accent); width:0%; transition:1.5s;"></div>
				</div>
			</div>

			<div class="grid" style="margin-bottom:2rem;">
				<div class="card">
					<div style="color:var(--text-dim); font-size:0.8rem;">VIEWERS</div>
					<div id="tot-v" style="font-size:1.5rem; font-weight:bold;">0</div>
				</div>
				<div class="card">
					<div style="color:var(--text-dim); font-size:0.8rem;">XP DISTRIBUÉE</div>
					<div id="tot-xp" style="font-size:1.5rem; font-weight:bold;">0</div>
				</div>
				<div class="card">
					<div style="color:var(--text-dim); font-size:0.8rem;">NIVEAU MAX</div>
					<div id="max-l" style="font-size:1.5rem; font-weight:bold; color:gold;">1</div>
				</div>
			</div>

			<div class="card" style="padding:0;">
				<div style="padding:15px; border-bottom:1px solid var(--border); font-weight:bold;">LES 5 PILIERS</div>
				<div id="top5-list"></div>
			</div>
		</main>

		<script src="config.js"></script>
		<script src="app.js"></script>
		<script src="sidebar.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", async () => {
			const token = checkAuth();
			if(!token) return;

			try {
			const resp = await fetch(`${CONFIG.API_BASE_URL}/global_stats`, {
			headers: { "ngrok-skip-browser-warning": "true" }
			});
			const data = await resp.json();

			document.getElementById("tot-v").textContent = data.total_members.toLocaleString();
			document.getElementById("tot-xp").textContent = data.total_xp.toLocaleString();
			document.getElementById("max-l").textContent = calculateLevel(data.max_xp);

			const t5 = document.getElementById("top5-list");
			data.top5.filter(u => u.username !== "masthom_").forEach((u, i) => {
			const d = document.createElement("div");
			d.style.padding = "12px 15px";
			d.style.display = "flex";
			d.style.justifyContent = "space-between";
			d.style.borderBottom = "1px solid var(--border)";
			d.innerHTML = `<span>
				${i+1}. <b>${u.username}</b>
			</span><span style="color:var(--accent); font-weight:bold;">Niv. ${calculateLevel(u.points)}</span>`;
			t5.appendChild(d);
			});

			// Followers Twitch
			const tResp = await fetch(`https://api.twitch.tv/helix/users?login=${CONFIG.BROADCASTER_NAME}`, {
			headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CONFIG.CLIENT_ID }
			});
			const tData = await tResp.json();
			const bId = tData.data[0].id;

			const fResp = await fetch(`https://api.twitch.tv/helix/channels/followers?broadcaster_id=${bId}`, {
			headers: { 'Authorization': `Bearer ${token}`, 'Client-Id': CONFIG.CLIENT_ID }
			});
			const fData = await fResp.json();
			document.getElementById("cur-f").textContent = fData.total;
			document.getElementById("f-bar").style.width = (fData.total / 1500 * 100) + "%";
			} catch(e) {}
			});
		</script>
	</body>
</html>
